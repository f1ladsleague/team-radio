<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Lads League | Team Radio</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/f1ladsleague/sidebetting/9e649c454badbe13d3d17c100f0f535a7555a058/favicon.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=Share+Tech+Mono&family=Titillium+Web:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --f1-dark: #09090c; --f1-card: #111118; --f1-border: #22222d; --theme-color: #444; }
        body { font-family: 'Titillium Web', sans-serif; background: var(--f1-dark); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .brand-header { margin-bottom: 25px; margin-top: 10px; }
        .brand-logo { height: 75px; object-fit: contain; transition: 0.2s; }
        .brand-logo:hover { filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2)); transform: scale(1.02); }

        .dashboard { width: 100%; max-width: 900px; background: var(--f1-card); padding: 30px; border-radius: 8px; border: 1px solid var(--f1-border); border-top: 4px solid var(--theme-color); box-shadow: 0 10px 40px rgba(0,0,0,0.9); transition: all 0.4s ease; box-sizing: border-box; position: relative; }
        .dashboard::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px); pointer-events: none; border-radius: 8px; }
        .dashboard.logged-in { max-width: 600px; }

        .dash-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--f1-border); padding-bottom: 15px; margin-bottom: 25px; gap: 15px; }
        #active-team-logo { display: none; height: 45px; object-fit: contain; }

        .telemetry-status { font-family: 'Share Tech Mono', monospace; color: #888; font-size: 16px; background: #050508; padding: 8px 15px; border-radius: 4px; border: 1px solid #333; text-align: center; white-space: nowrap; font-weight: 400; letter-spacing: 1px; }

        .team-grid { display: flex; flex-wrap: nowrap; gap: 15px; justify-content: space-between; margin-bottom: 25px; transition: 0.3s; }
        .team-btn { flex: 1; background: #050508; border: 1px solid #333; border-radius: 6px; padding: 15px 10px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; filter: grayscale(100%) opacity(0.4); }
        .team-btn:hover { filter: grayscale(50%) opacity(0.8); background: #111; border-color: #555; }
        .team-btn.selected { filter: grayscale(0%) opacity(1); border-color: var(--theme-color); box-shadow: inset 0 0 15px rgba(255,255,255,0.05); background: #1a1a24; }
        .team-logo { height: 35px; width: auto; max-width: 100%; object-fit: contain; }

        #auth-section { display: none; text-align: center; margin-top: 20px; background: #050508; padding: 30px; border-radius: 6px; border: 1px dashed var(--f1-border); }
        .auth-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 15px; }
        input[type="password"] { padding: 15px; width: 250px; border-radius: 4px; border: 1px solid var(--theme-color); background: #000; color: white; font-family: 'Share Tech Mono', monospace; font-size: 18px; text-align: center; outline: none; }
        .login-btn { padding: 15px 30px; background: var(--theme-color); color: #fff; border: none; border-radius: 4px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .login-btn:hover { filter: brightness(1.2); }

        #driver-section { display: none; text-align: center; }

        #live-banner {
            display: none;
            background: #0a0000;
            border: 1px solid #ff0000;
            border-left: 5px solid #ff0000;
            border-radius: 4px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(225, 6, 0, 0.2), inset 0 0 20px rgba(255, 0, 0, 0.1);
            width: 100%;
            box-sizing: border-box;
            padding: 12px 20px;
            justify-content: space-between;
            align-items: center;
            font-family: 'Share Tech Mono', monospace;
        }
        
        .banner-left { display: flex; align-items: center; gap: 15px; text-align: left; }
        .banner-right { text-align: right; }
        
        .data-label { color: #888; font-size: 11px; display: block; letter-spacing: 2px; margin-bottom: 2px; font-family: 'Chakra Petch', sans-serif; font-weight: 700; }
        .data-value { color: #ff4444; font-size: 22px; text-shadow: 0 0 8px rgba(255, 0, 0, 0.6); line-height: 1; }
        
        #live-countdown { font-size: 32px; color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
        .ms-unit { font-size: 16px; color: #aaa; margin-left: 2px; }

        .blinking-dot { width: 14px; height: 14px; background-color: #ff0000; border-radius: 50%; box-shadow: 0 0 10px #ff0000; animation: flash 0.8s infinite alternate; transition: 0.2s; }
        .orange-dot { background-color: #F47600 !important; box-shadow: 0 0 10px #F47600 !important; animation: none !important; }
        @keyframes flash { from { opacity: 1; box-shadow: 0 0 15px #ff0000; } to { opacity: 0.2; box-shadow: 0 0 2px #ff0000; } }

        .driver-grid { display: flex; justify-content: center; gap: 30px; }
        .driver-wrap { display: flex; flex-direction: column; gap: 10px; align-items: center; width: 220px; }
        
        .driver-card { background: #050508; border: 1px solid #222; border-radius: 6px; overflow: hidden; width: 100%; cursor: pointer; transition: 0.3s; position: relative; }
        .driver-card.disabled { opacity: 0.3; filter: grayscale(100%); cursor: not-allowed; pointer-events: none; }
        .driver-card:hover:not(.disabled) { transform: translateY(-3px); border-color: #555; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .driver-photo-wrap { width: 100%; height: 220px; background-color: var(--theme-color); position: relative; border-bottom: 1px solid #222; }
        .driver-photo { width: 100%; height: 100%; object-fit: cover; object-position: top center; mix-blend-mode: normal; }
        .driver-name { padding: 12px; font-size: 18px; font-weight: 900; text-transform: uppercase; margin: 0; text-align: center; background: #050508; letter-spacing: 1px; }
        
        .driver-card.active { border-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); }
        .driver-card.active .driver-name { background: #1a0000; color: #ff4444; }
        
        .live-led { position: absolute; top: 12px; right: 12px; width: 12px; height: 12px; background: #ff0000; border-radius: 50%; box-shadow: 0 0 10px #ff0000; display: none; z-index: 10; animation: flash 0.8s infinite alternate; }
        .driver-card.active .live-led { display: block; }

        .driver-check-btn { 
            display: none; background: #111; color: #aaa; border: 1px solid #444; 
            padding: 10px; border-radius: 4px; font-family: 'Share Tech Mono', monospace; 
            font-size: 14px; text-transform: uppercase; cursor: pointer; width: 100%; transition: 0.2s; 
        }
        .driver-check-btn:hover { background: #222; color: #fff; border-color: #666; }
        .driver-check-btn.active-check { 
            background: #1a0000; color: #ff4444; border-color: #ff0000; 
            box-shadow: inset 0 0 10px rgba(255,0,0,0.2); 
        }

        /* --- UPDATED MOBILE VIEW (NO SCROLL, SLIGHTLY BIGGER) --- */
        @media (max-width: 768px) {
            body { padding: 15px; }
            .brand-header { margin-bottom: 15px; margin-top: 5px; }
            .brand-logo { height: 55px; }
            .dashboard { padding: 20px; }
            .dash-header { flex-direction: column; gap: 12px; margin-bottom: 20px; padding-bottom: 15px; }
            .telemetry-status { white-space: normal; word-wrap: break-word; width: 100%; box-sizing: border-box; font-size: 14px; padding: 8px 10px; }
            
            /* Team Logos 1 Per Row */
            .team-grid { flex-direction: column; gap: 10px; margin-bottom: 20px; }
            .team-btn { width: 100%; padding: 12px; box-sizing: border-box; }
            .team-logo { height: 28px; }
            
            #auth-section { padding: 20px; margin-top: 15px; }
            .auth-controls { flex-direction: column; margin-top: 15px; gap: 10px; }
            input[type="password"] { width: 100%; box-sizing: border-box; padding: 12px; font-size: 18px; }
            .login-btn { width: 100%; box-sizing: border-box; padding: 12px; font-size: 16px; }

            /* Compress Live Banner */
            #live-banner { margin-bottom: 20px; padding: 10px 15px; flex-direction: column; gap: 10px; text-align: center; }
            .banner-left { justify-content: center; width: 100%; }
            .banner-right { text-align: center; width: 100%; border-top: 1px solid #330000; padding-top: 10px; }
            .data-value { font-size: 20px; }
            #live-countdown { font-size: 28px; }

            /* Side-by-side Driver View */
            .driver-grid { flex-direction: row; gap: 12px; align-items: stretch; justify-content: center; }
            .driver-wrap { width: 48%; gap: 8px; }
            .driver-photo-wrap { height: 130px; }
            .driver-name { font-size: 15px; padding: 10px; }
            .driver-check-btn { font-size: 12px; padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <a href="https://f1lads.com" target="_blank">
            <img class="brand-logo" src="https://raw.githubusercontent.com/f1ladsleague/sidebetting/9e649c454badbe13d3d17c100f0f535a7555a058/Logo.png" alt="F1 Lads Logo">
        </a>
    </div>

    <div class="dashboard" id="main-dash">
        <div class="dash-header">
            <img id="active-team-logo" src="" alt="Team Logo">
            <div class="telemetry-status" id="telemetry">[ SYS. STANDBY ]</div>
        </div>
        
        <div class="team-grid" id="team-grid">
            <div class="team-btn" onclick="selectTeam('Mercedes', '#00D7B6', 'MercF1l@ds', [{d: 'Rodda', f: 'Rodda'}, {d: 'Kalpa', f: 'Kalpa'}], 'Mercedes', 'MER.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/MER.png" class="team-logo">
            </div>
            <div class="team-btn" onclick="selectTeam('Red Bull', '#4781D7', 'RB123', [{d: 'Nippa E', f: 'NippaE'}, {d: 'Eranga', f: 'Eranga'}], 'RedBull', 'RB.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/RB.png" class="team-logo">
            </div>
            <div class="team-btn" onclick="selectTeam('Ferrari', '#ED1131', 'forzaferrari', [{d: 'Mapa', f: 'Mapa'}, {d: 'Shiyan', f: 'Shiyan'}], 'Ferrari', 'FER.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/FER.png" class="team-logo">
            </div>
            <div class="team-btn" onclick="selectTeam('McLaren', '#F47600', 'MCC2026', [{d: 'Sahan', f: 'Sahan'}, {d: 'Sameera', f: 'Sameera'}], 'Mclaren', 'MCL.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/MCL.png" class="team-logo">
            </div>
            <div class="team-btn" onclick="selectTeam('Aston Martin', '#229971', 'Mapasunkredbull', [{d: 'Shahan', f: 'Shahan'}, {d: 'Nuwie G', f: 'NuwieG'}], 'AstonMartin', 'AM.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/AM.png" class="team-logo">
            </div>
        </div>

        <div id="auth-section">
            <h3 style="margin-top:0; color: #888; font-weight: 600; text-transform: uppercase; font-family: 'Chakra Petch', sans-serif;">Awaiting Auth</h3>
            <div class="auth-controls">
                <input type="password" id="team-pass" placeholder="PASSWORD">
                <button class="login-btn" onclick="authenticate()">Unlock</button>
            </div>
        </div>

        <div id="driver-section">
            <div id="live-banner">
                <div class="banner-left">
                    <div class="blinking-dot" id="comms-led"></div>
                    <div>
                        <span class="data-label">COMMS STATUS</span>
                        <span class="data-value" id="comms-status-text">TX LIVE</span>
                    </div>
                </div>
                <div class="banner-right">
                    <span class="data-label">T-MINUS (WINDOW)</span>
                    <span id="live-countdown">00.000</span><span class="ms-unit" id="ms-label">s</span>
                </div>
            </div>
            
            <div class="driver-grid" id="driver-container"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCiZwdBkZBZubr8oVsG8hkNE-x2iq3HJ0",
            authDomain: "f1-lads-team-radio-589fc.firebaseapp.com",
            databaseURL: "https://f1-lads-team-radio-589fc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "f1-lads-team-radio-589fc",
            storageBucket: "f1-lads-team-radio-589fc.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Allow pressing "Enter" to unlock the dashboard
        document.getElementById('team-pass').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                authenticate();
            }
        });

        const peer = new Peer(); 
        let localMicStream = null;
        let activeCalls = []; 
        let lineIsBusy = false;

        let currentTeam = null, currentHex = null, currentPass = null, currentDrivers = [], currentFileSuffix = null, currentLogo = null;
        let activeDriverFile = null, safetyTimer = null, raceState = "PRE-RACE", currentLap = 0, lastTransmittedLap = -1;
        
        let precisionTimerInterval = null;

        const TARGET_TOWERS = ['f1lads-tower-obs', 'f1lads-tower-discord'];

        function selectTeam(name, hex, pass, drivers, suffix, logoFile) {
            if(activeDriverFile) return; 
            currentTeam = name; currentHex = hex; currentPass = pass; 
            currentDrivers = drivers; currentFileSuffix = suffix; currentLogo = logoFile;
            document.querySelectorAll('.team-btn').forEach(btn => btn.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.documentElement.style.setProperty('--theme-color', hex);
            document.getElementById('auth-section').style.display = 'block';
        }

        async function authenticate() {
            if (document.getElementById('team-pass').value === currentPass) {
                try {
                    localMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } catch (err) {
                    alert("[ ERR ] Mic access denied. Audio will not be transmitted.");
                }
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('team-grid').style.display = 'none';
                document.getElementById('main-dash').classList.add('logged-in');
                const logoEl = document.getElementById('active-team-logo');
                logoEl.src = `https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/${currentLogo}`;
                logoEl.style.display = 'block';
                buildDriverGrid();
                document.getElementById('driver-section').style.display = 'block';
                evaluateTelemetryState();
            } else { alert("ACCESS DENIED"); }
        }

        function buildDriverGrid() {
            const container = document.getElementById('driver-container');
            container.innerHTML = '';
            currentDrivers.forEach(driver => {
                container.innerHTML += `
                    <div class="driver-wrap">
                        <div class="driver-card" id="card-${driver.f}" onclick="toggleRadio('${driver.f}', '${driver.d}')">
                            <div class="live-led"></div>
                            <div class="driver-photo-wrap">
                                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/${driver.f}.png" class="driver-photo">
                            </div>
                            <h3 class="driver-name">${driver.d}</h3>
                        </div>
                        <button class="driver-check-btn" id="check-${driver.f}" onclick="performDriverCheck('${driver.f}', '${driver.d}')">RADIO CHECK: ${driver.d}</button>
                    </div>`;
            });
        }

        function startPrecisionCountdown(totalDurationMs, buttonEl) {
            const liveBanner = document.getElementById('live-banner');
            const countdownEl = document.getElementById('live-countdown');
            const msLabelEl = document.getElementById('ms-label');
            const statusTextEl = document.getElementById('comms-status-text');
            const ledEl = document.getElementById('comms-led');
            
            const now = Date.now();
            const introDurationMs = 1500; 
            const introEndTime = now + introDurationMs;
            const totalEndTime = now + totalDurationMs;
            
            liveBanner.style.display = 'flex'; 

            if(localMicStream) localMicStream.getAudioTracks()[0].enabled = false;

            clearInterval(precisionTimerInterval);
            precisionTimerInterval = setInterval(() => {
                const currentTime = Date.now();
                
                if (currentTime < introEndTime) {
                    // PHASE 1: CONNECTING / WAITING (0 to 1.5s)
                    const remainingIntro = Math.max(0, introEndTime - currentTime);
                    const formattedIntro = (remainingIntro / 1000).toFixed(3).padStart(6, '0');
                    
                    // Left Status: Orange, Solid LED, "CONNECTING..."
                    statusTextEl.innerText = "CONNECTING...";
                    statusTextEl.style.color = "#F47600";
                    statusTextEl.style.textShadow = "0 0 8px rgba(244, 118, 0, 0.6)";
                    ledEl.classList.add('orange-dot');

                    // Right Timer: Raw Milliseconds (Orange)
                    countdownEl.innerText = formattedIntro;
                    countdownEl.style.color = "#F47600";
                    msLabelEl.style.color = "#F47600";

                    if(buttonEl) {
                        buttonEl.innerText = `CONNECTING: ${formattedIntro}s`;
                        buttonEl.style.color = "#F47600";
                    }
                } else {
                    // PHASE 2: LIVE BROADCAST (1.5s to End)
                    if(localMicStream && !localMicStream.getAudioTracks()[0].enabled) {
                        localMicStream.getAudioTracks()[0].enabled = true; 
                    }
                    
                    const remainingLive = Math.max(0, totalEndTime - currentTime);
                    const formattedTime = (remainingLive / 1000).toFixed(3).padStart(6, '0');
                    
                    // Left Status: Red, Blinking LED, "TX LIVE"
                    statusTextEl.innerText = "TX LIVE";
                    statusTextEl.style.color = "#ff4444";
                    statusTextEl.style.textShadow = "0 0 8px rgba(255, 0, 0, 0.6)";
                    ledEl.classList.remove('orange-dot');

                    // Right Timer: Raw Milliseconds (White)
                    countdownEl.innerText = formattedTime;
                    countdownEl.style.color = "#fff";
                    msLabelEl.style.color = "#aaa";
                    
                    if(buttonEl) {
                        buttonEl.innerText = `> TX: ${formattedTime}s`;
                        buttonEl.style.color = "#ff4444";
                    }

                    if (remainingLive <= 0) {
                        clearInterval(precisionTimerInterval);
                    }
                }
            }, 30); 
        }

        function dialTowers() {
            activeCalls = [];
            if (!localMicStream) return;
            TARGET_TOWERS.forEach(towerId => {
                const call = peer.call(towerId, localMicStream);
                if (call) activeCalls.push(call);
            });
        }

        function hangupTowers() {
            activeCalls.forEach(call => {
                if (call) call.close();
            });
            activeCalls = [];
        }

        function performDriverCheck(fileId, displayName) {
            if (lineIsBusy) { alert("[ ERR ] The line is busy with another team."); return; }
            if (!localMicStream) { alert("[ ERR ] Microphone not connected."); return; }

            const btn = document.getElementById(`check-${fileId}`);
            const originalText = `RADIO CHECK: ${displayName}`;
            
            btn.classList.add('active-check');
            document.querySelectorAll('.driver-check-btn').forEach(b => b.style.pointerEvents = "none");

            startPrecisionCountdown(5000, btn);

            db.ref('radioState').set({
                active: true, 
                team: currentTeam, 
                driver: displayName + " (TEST)",
                video: `${fileId}_${currentFileSuffix}.webm`, 
                timestamp: Date.now()
            });

            dialTowers();

            setTimeout(() => {
                clearInterval(precisionTimerInterval);
                db.ref('radioState').update({ active: false });
                hangupTowers();
                
                document.getElementById('live-banner').style.display = 'none';
                btn.innerText = originalText;
                btn.style.color = ""; 
                btn.classList.remove('active-check');
                document.querySelectorAll('.driver-check-btn').forEach(b => b.style.pointerEvents = "auto");
            }, 5000);
        }

        function toggleRadio(fileId, displayName) {
            if (activeDriverFile && activeDriverFile !== fileId) return; 
            const card = document.getElementById(`card-${fileId}`);
            
            if (!activeDriverFile) {
                if (lineIsBusy) { return; } 
                if (raceState === "PRE-RACE" || currentLap < 3 || currentLap === lastTransmittedLap) return;

                activeDriverFile = fileId;
                card.classList.add('active');
                lastTransmittedLap = currentLap; 
                
                startPrecisionCountdown(12000, null);
                
                db.ref('radioState').set({
                    active: true, team: currentTeam, driver: displayName,
                    video: `${fileId}_${currentFileSuffix}.webm`, timestamp: Date.now()
                });

                dialTowers();
                
                safetyTimer = setTimeout(() => { 
                    if(activeDriverFile) toggleRadio(activeDriverFile, displayName); 
                }, 12000);
            } else {
                clearTimeout(safetyTimer);
                clearInterval(precisionTimerInterval);
                document.getElementById('live-banner').style.display = 'none';
                
                activeDriverFile = null;
                card.classList.remove('active');
                db.ref('radioState').update({ active: false });
                hangupTowers();
                evaluateTelemetryState();
            }
        }

        function updateTelemetry(text, color = "#888") {
            const tel = document.getElementById('telemetry');
            tel.innerText = text; tel.style.color = color; tel.style.borderColor = color === "#888" ? "#333" : color;
        }

        function evaluateTelemetryState() {
            const checkBtns = document.querySelectorAll('.driver-check-btn');
            const cards = document.querySelectorAll('.driver-card');
            if (raceState === "PRE-RACE") {
                updateTelemetry("[ PRE-RACE : RADIO CHECKS OPEN ]", "#00D7B6");
                checkBtns.forEach(btn => btn.style.display = "block");
                cards.forEach(c => c.classList.add('disabled')); 
            } else {
                checkBtns.forEach(btn => btn.style.display = "none");
                if (currentLap < 3) {
                    updateTelemetry(`[ LOCKED UNTIL L3 (CURR: L${currentLap}) ]`, "#ff4444");
                    cards.forEach(c => c.classList.add('disabled'));
                } else if (currentLap === lastTransmittedLap) {
                    updateTelemetry(`[ L${currentLap} : TRANSMISSION COMPLETED ]`, "#F47600");
                    cards.forEach(c => c.classList.add('disabled'));
                } else {
                    updateTelemetry(`[ L${currentLap} : COMMS READY ]`, "#00D7B6");
                    cards.forEach(c => c.classList.remove('disabled'));
                }
            }
        }

        db.ref('radioState').on('value', (snapshot) => {
            const radio = snapshot.val();
            if (radio && radio.active && radio.team !== currentTeam) {
                lineIsBusy = true;
                updateTelemetry(`[ LINE BUSY : ${radio.team.toUpperCase()} ]`, "#ff4444");
                document.querySelectorAll('.driver-card').forEach(c => c.classList.add('disabled'));
            } else if (radio && !radio.active) {
                lineIsBusy = false;
                evaluateTelemetryState();
            }
        });

        db.ref('telemetryState').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.lap && data.lap !== currentLap) {
                if (data.lap < currentLap) lastTransmittedLap = -1;
                currentLap = data.lap; raceState = data.state;
                if (!activeDriverFile) evaluateTelemetryState();
            }
        });
    </script>
</body>
