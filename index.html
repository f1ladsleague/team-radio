<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pit Wall | F1 Lads Radio</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/f1ladsleague/sidebetting/9e649c454badbe13d3d17c100f0f535a7555a058/favicon.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=Titillium+Web:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --f1-dark: #0e0e14; --f1-card: #15151e; --f1-border: #2a2a35; --theme-color: #444; }
        body { font-family: 'Titillium Web', sans-serif; background: var(--f1-dark); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .brand-header { margin-bottom: 25px; margin-top: 10px; }
        .brand-logo { height: 75px; object-fit: contain; }

        .dashboard { width: 100%; max-width: 900px; background: var(--f1-card); padding: 30px; border-radius: 12px; border: 1px solid var(--f1-border); border-top: 6px solid var(--theme-color); box-shadow: 0 10px 40px rgba(0,0,0,0.8); transition: all 0.4s ease; box-sizing: border-box; }
        .dashboard.logged-in { max-width: 600px; }

        .dash-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--f1-border); padding-bottom: 15px; margin-bottom: 25px; gap: 15px; }
        #active-team-logo { display: none; height: 45px; object-fit: contain; }

        .telemetry-status { font-family: 'Chakra Petch', monospace; color: #888; font-size: 16px; background: #0a0a0f; padding: 8px 15px; border-radius: 4px; border: 1px solid #222; text-align: center; white-space: nowrap; font-weight: 700; }

        .team-grid { display: flex; flex-wrap: nowrap; gap: 15px; justify-content: space-between; margin-bottom: 25px; transition: 0.3s; }
        .team-btn { flex: 1; background: #0a0a0f; border: 2px solid #222; border-radius: 8px; padding: 15px 10px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; filter: grayscale(100%) opacity(0.4); }
        .team-btn:hover { filter: grayscale(50%) opacity(0.8); background: #111; }
        .team-btn.selected { filter: grayscale(0%) opacity(1); border-color: var(--theme-color); box-shadow: inset 0 0 15px rgba(255,255,255,0.05); background: #1a1a24; }
        .team-logo { height: 35px; width: auto; max-width: 100%; object-fit: contain; }

        #auth-section { display: none; text-align: center; margin-top: 20px; background: #0a0a0f; padding: 30px; border-radius: 8px; border: 1px dashed var(--f1-border); }
        .auth-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 15px; }
        input[type="password"] { padding: 15px; width: 250px; border-radius: 6px; border: 1px solid var(--theme-color); background: #000; color: white; font-family: 'Chakra Petch', monospace; font-size: 18px; text-align: center; outline: none; }
        .login-btn { padding: 15px 30px; background: var(--theme-color); color: #fff; border: none; border-radius: 6px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .login-btn:hover { filter: brightness(1.2); }

        #driver-section { display: none; text-align: center; }

        /* --- NEW LIVE BANNER CSS --- */
        #live-banner {
            display: none;
            background: #e10600;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(225, 6, 0, 0.4);
            border: 2px solid #ff4444;
            letter-spacing: 1px;
            width: 100%;
            box-sizing: border-box;
        }
        .blinking-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
            animation: pulse 1s infinite;
        }
        /* --------------------------- */

        .driver-grid { display: flex; justify-content: center; gap: 30px; }
        .driver-wrap { display: flex; flex-direction: column; gap: 10px; align-items: center; width: 220px; }
        .driver-card { background: #0a0a0f; border: 2px solid #222; border-radius: 8px; overflow: hidden; width: 100%; cursor: pointer; transition: 0.3s; position: relative; }
        .driver-card.disabled { opacity: 0.4; filter: grayscale(100%); cursor: not-allowed; pointer-events: none; }
        .driver-card:hover:not(.disabled) { transform: translateY(-5px); border-color: #555; }
        
        .driver-photo-wrap { width: 100%; height: 220px; background-color: var(--theme-color); position: relative; border-bottom: 2px solid #222; }
        .driver-photo { width: 100%; height: 100%; object-fit: cover; object-position: top center; mix-blend-mode: normal; }
        .driver-name { padding: 15px; font-size: 22px; font-weight: 900; text-transform: uppercase; margin: 0; text-align: center; background: #0a0a0f; }
        
        .driver-card.active { border-color: red; box-shadow: 0 0 25px rgba(255, 0, 0, 0.4); }
        .driver-card.active .driver-name { background: #3a0000; color: #ff4444; }
        .live-led { position: absolute; top: 15px; right: 15px; width: 15px; height: 15px; background: red; border-radius: 50%; box-shadow: 0 0 10px red; display: none; z-index: 10; }
        .driver-card.active .live-led { display: block; animation: pulse 1s infinite; }

        .driver-check-btn { display: none; background: #555; color: white; border: 2px solid #777; padding: 10px 15px; border-radius: 6px; font-weight: 900; font-size: 13px; text-transform: uppercase; cursor: pointer; width: 100%; transition: 0.3s; }
        .driver-check-btn:hover { background: #666; border-color: #888; }
        .driver-check-btn.active-check { background: #e10600; border-color: #ff4444; box-shadow: 0 0 15px rgba(225, 6, 0, 0.5); }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

        @media (max-width: 768px) {
            .dash-header { flex-direction: column; gap: 15px; }
            .telemetry-status { white-space: normal; word-wrap: break-word; width: 100%; box-sizing: border-box; font-size: 14px; }
            .team-grid { flex-direction: column; gap: 12px; }
            .team-btn { width: 100%; padding: 18px; box-sizing: border-box; }
            .auth-controls { flex-direction: column; width: 100%; }
            input[type="password"] { width: 100%; box-sizing: border-box; }
            .login-btn { width: 100%; margin-left: 0; box-sizing: border-box; }
            .driver-grid { flex-direction: column; align-items: center; gap: 20px; }
            .driver-wrap { width: 100%; max-width: 280px; box-sizing: border-box; }
            #live-banner { font-size: 16px; } /* Slightly smaller banner text on mobile */
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <img class="brand-logo" src="https://raw.githubusercontent.com/f1ladsleague/sidebetting/9e649c454badbe13d3d17c100f0f535a7555a058/Logo.png" alt="F1 Lads Logo">
    </div>

    <div class="dashboard" id="main-dash">
        <div class="dash-header">
            <img id="active-team-logo" src="" alt="Team Logo">
            <div class="telemetry-status" id="telemetry">[ SYS. STANDBY ]</div>
        </div>
        
        <div class="team-grid" id="team-grid">
            <div class="team-btn" onclick="selectTeam('Mercedes', '#00D7B6', 'MercF1l@ds', [{d: 'Rodda', f: 'Rodda'}, {d: 'Kalpa', f: 'Kalpa'}], 'Mercedes', 'MER.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/MER.png" class="team-logo">
            </div>
            <div class="team-btn" onclick="selectTeam('Red Bull', '#4781D7', 'RB123', [{d: 'Nippa E', f: 'NippaE'}, {d: 'Eranga', f: 'Eranga'}], 'RedBull', 'RB.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/RB.png" class="team-logo">
            </div>
            <div class="team-btn" onclick="selectTeam('Ferrari', '#ED1131', 'forzaferrari', [{d: 'Mapa', f: 'Mapa'}, {d: 'Shiyan', f: 'Shiyan'}], 'Ferrari', 'FER.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/FER.png" class="team-logo">
            </div>
            <div class="team-btn" onclick="selectTeam('McLaren', '#F47600', 'MCC2026', [{d: 'Sahan', f: 'Sahan'}, {d: 'Sameera', f: 'Sameera'}], 'Mclaren', 'MCL.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/MCL.png" class="team-logo">
            </div>
            <div class="team-btn" onclick="selectTeam('Aston Martin', '#229971', 'Mapasunkredbull', [{d: 'Shahan', f: 'Shahan'}, {d: 'Nuwie G', f: 'NuwieG'}], 'AstonMartin', 'AM.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/AM.png" class="team-logo">
            </div>
        </div>

        <div id="auth-section">
            <h3 style="margin-top:0; color: #888; font-weight: 600; text-transform: uppercase;">Awaiting Authentication</h3>
            <div class="auth-controls">
                <input type="password" id="team-pass" placeholder="Password">
                <button class="login-btn" onclick="authenticate()">Unlock</button>
            </div>
        </div>

        <div id="driver-section">
            <div id="live-banner">
                <span class="blinking-dot"></span> LIVE TRANSMISSION - <span id="live-countdown">12</span>s
            </div>
            
            <div class="driver-grid" id="driver-container"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCiZwdBkZBZubr8oVsG8hkNE-x2iq3HJ0",
            authDomain: "f1-lads-team-radio-589fc.firebaseapp.com",
            databaseURL: "https://f1-lads-team-radio-589fc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "f1-lads-team-radio-589fc",
            storageBucket: "f1-lads-team-radio-589fc.firebasestorage.app",
            messagingSenderId: "449577983062",
            appId: "1:449577983062:web:db65755d30d1c6a14ceff7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const peer = new Peer(); 
        let localMicStream = null;
        let activeCall = null;
        let lineIsBusy = false;

        let currentTeam = null, currentHex = null, currentPass = null, currentDrivers = [], currentFileSuffix = null, currentLogo = null;
        let activeDriverFile = null, safetyTimer = null, raceState = "PRE-RACE", currentLap = 0, lastTransmittedLap = -1;
        
        // New variables to track our interval timers
        let testCountdownInterval = null;
        let liveCountdownInterval = null;

        function selectTeam(name, hex, pass, drivers, suffix, logoFile) {
            if(activeDriverFile) return; 
            currentTeam = name; currentHex = hex; currentPass = pass; 
            currentDrivers = drivers; currentFileSuffix = suffix; currentLogo = logoFile;
            document.querySelectorAll('.team-btn').forEach(btn => btn.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.documentElement.style.setProperty('--theme-color', hex);
            document.getElementById('auth-section').style.display = 'block';
        }

        async function authenticate() {
            if (document.getElementById('team-pass').value === currentPass) {
                try {
                    localMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } catch (err) {
                    alert("⚠️ Mic access denied. Audio will not be transmitted.");
                }
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('team-grid').style.display = 'none';
                document.getElementById('main-dash').classList.add('logged-in');
                const logoEl = document.getElementById('active-team-logo');
                logoEl.src = `https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/${currentLogo}`;
                logoEl.style.display = 'block';
                buildDriverGrid();
                document.getElementById('driver-section').style.display = 'block';
                evaluateTelemetryState();
            } else { alert("ACCESS DENIED"); }
        }

        function buildDriverGrid() {
            const container = document.getElementById('driver-container');
            container.innerHTML = '';
            currentDrivers.forEach(driver => {
                container.innerHTML += `
                    <div class="driver-wrap">
                        <div class="driver-card" id="card-${driver.f}" onclick="toggleRadio('${driver.f}', '${driver.d}')">
                            <div class="live-led"></div>
                            <div class="driver-photo-wrap">
                                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/${driver.f}.png" class="driver-photo">
                            </div>
                            <h3 class="driver-name">${driver.d}</h3>
                        </div>
                        <button class="driver-check-btn" id="check-${driver.f}" onclick="performDriverCheck('${driver.f}', '${driver.d}')">Radio Check ${driver.d}</button>
                    </div>`;
            });
        }

        function performDriverCheck(fileId, displayName) {
            if (lineIsBusy) { alert("Wait a second, the line is busy with another team!"); return; }
            if (!localMicStream) { alert("⚠️ Microphone not connected!"); return; }
        
            const btn = document.getElementById(`check-${fileId}`);
            const originalText = `Radio Check ${displayName}`;
            
            // Grab the banner elements
            const liveBanner = document.getElementById('live-banner');
            const countdownEl = document.getElementById('live-countdown');
            let timeLeft = 5;
            
            // Show the banner and set initial time
            liveBanner.style.display = 'block';
            countdownEl.innerText = timeLeft;
        
            btn.innerText = `🎙️ TESTING (${timeLeft}s)...`;
            btn.classList.add('active-check');
            document.querySelectorAll('.driver-check-btn').forEach(b => b.style.pointerEvents = "none");
        
            clearInterval(testCountdownInterval);
            testCountdownInterval = setInterval(() => {
                timeLeft--;
                if(timeLeft >= 0) {
                    btn.innerText = `🎙️ TESTING (${timeLeft}s)...`;
                    countdownEl.innerText = timeLeft; // Update the banner countdown too!
                }
            }, 1000);
        
            db.ref('radioState').set({
                active: true, 
                team: currentTeam, 
                driver: displayName + " (TEST)",
                video: `${fileId}_${currentFileSuffix}.webm`, 
                timestamp: Date.now()
            });
        
            activeCall = peer.call('f1lads-hq-tower-8844', localMicStream);
        
            setTimeout(() => {
                clearInterval(testCountdownInterval);
                db.ref('radioState').update({ active: false });
                if (activeCall) { activeCall.close(); activeCall = null; }
                
                // Hide the banner when the test finishes
                liveBanner.style.display = 'none';
                
                btn.innerText = originalText;
                btn.classList.remove('active-check');
                document.querySelectorAll('.driver-check-btn').forEach(b => b.style.pointerEvents = "auto");
            }, 5000);
        }

        function toggleRadio(fileId, displayName) {
            if (activeDriverFile && activeDriverFile !== fileId) return; 
            const card = document.getElementById(`card-${fileId}`);
            const liveBanner = document.getElementById('live-banner');
            const countdownEl = document.getElementById('live-countdown');
            
            if (!activeDriverFile) {
                if (lineIsBusy) { updateTelemetry("[ LINE BUSY - WAIT ]", "#ff4444"); return; }
                if (raceState === "PRE-RACE" || currentLap < 3 || currentLap === lastTransmittedLap) return;

                activeDriverFile = fileId;
                card.classList.add('active');
                lastTransmittedLap = currentLap; 
                
                // --- SHOW LIVE BANNER AND START 12s COUNTDOWN ---
                let liveTimeLeft = 12;
                countdownEl.innerText = liveTimeLeft;
                liveBanner.style.display = 'block';
                
                clearInterval(liveCountdownInterval);
                liveCountdownInterval = setInterval(() => {
                    liveTimeLeft--;
                    if(liveTimeLeft >= 0) countdownEl.innerText = liveTimeLeft;
                }, 1000);
                // ------------------------------------------------
                
                db.ref('radioState').set({
                    active: true, team: currentTeam, driver: displayName,
                    video: `${fileId}_${currentFileSuffix}.webm`, timestamp: Date.now()
                });

                if (localMicStream) { activeCall = peer.call('f1lads-hq-tower-8844', localMicStream); }
                
                safetyTimer = setTimeout(() => { 
                    if(activeDriverFile) toggleRadio(activeDriverFile, displayName); 
                }, 12000);
            } else {
                // --- HIDE BANNER AND CLEAN UP TIMERS ---
                clearTimeout(safetyTimer);
                clearInterval(liveCountdownInterval);
                liveBanner.style.display = 'none';
                
                activeDriverFile = null;
                card.classList.remove('active');
                db.ref('radioState').update({ active: false });
                if (activeCall) { activeCall.close(); activeCall = null; }
                evaluateTelemetryState();
            }
        }

        function updateTelemetry(text, color = "#888") {
            const tel = document.getElementById('telemetry');
            tel.innerText = text; tel.style.color = color; tel.style.borderColor = color === "#888" ? "#222" : color;
        }

        function evaluateTelemetryState() {
            const checkBtns = document.querySelectorAll('.driver-check-btn');
            const cards = document.querySelectorAll('.driver-card');
            if (raceState === "PRE-RACE") {
                updateTelemetry("[ PRE-RACE : RADIO CHECK OPEN ]", "#00D7B6");
                checkBtns.forEach(btn => btn.style.display = "block");
                cards.forEach(c => c.classList.add('disabled')); 
            } else {
                checkBtns.forEach(btn => btn.style.display = "none");
                if (currentLap < 3) {
                    updateTelemetry(`[ LOCKED UNTIL LAP 3 (L${currentLap}) ]`, "#ff4444");
                    cards.forEach(c => c.classList.add('disabled'));
                } else if (currentLap === lastTransmittedLap) {
                    updateTelemetry(`[ LAP ${currentLap} COMMS USED ]`, "#F47600");
                    cards.forEach(c => c.classList.add('disabled'));
                } else {
                    updateTelemetry(`[ LAP ${currentLap} COMMS READY ]`, "#00D7B6");
                    cards.forEach(c => c.classList.remove('disabled'));
                }
            }
        }

        db.ref('radioState').on('value', (snapshot) => {
            const radio = snapshot.val();
            if (radio && radio.active && radio.team !== currentTeam) {
                lineIsBusy = true;
                updateTelemetry(`[ LINE BUSY: ${radio.team.toUpperCase()} ]`, "#ff4444");
                document.querySelectorAll('.driver-card').forEach(c => c.classList.add('disabled'));
            } else if (radio && !radio.active) {
                lineIsBusy = false;
                evaluateTelemetryState();
            }
        });

        db.ref('telemetryState').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.lap && data.lap !== currentLap) {
                if (data.lap < currentLap) lastTransmittedLap = -1;
                currentLap = data.lap; raceState = data.state;
                if (!activeDriverFile) evaluateTelemetryState();
            }
        });
    </script>
</body>
</html>
