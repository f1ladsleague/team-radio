<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pit Wall | F1 Lads Radio</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=Titillium+Web:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --f1-dark: #0e0e14; --f1-card: #15151e; --f1-border: #2a2a35; --theme-color: #444; }
        body { font-family: 'Titillium Web', sans-serif; background: var(--f1-dark); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Main Dashboard Window */
        .dashboard { width: 100%; max-width: 900px; background: var(--f1-card); padding: 30px; border-radius: 12px; border: 1px solid var(--f1-border); border-top: 6px solid var(--theme-color); box-shadow: 0 10px 40px rgba(0,0,0,0.8); transition: all 0.4s ease; box-sizing: border-box; }
        
        /* Shrunk state for PC post-login */
        .dashboard.logged-in { max-width: 600px; }

        .dash-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--f1-border); padding-bottom: 15px; margin-bottom: 25px; }
        .dash-header h1 { margin: 0; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 24px; }
        
        /* Active Team Logo (Hidden by default) */
        #active-team-logo { display: none; height: 40px; object-fit: contain; }

        .telemetry-status { font-family: 'Chakra Petch', monospace; color: #888; font-size: 16px; background: #0a0a0f; padding: 8px 15px; border-radius: 4px; border: 1px solid #222; text-align: center; white-space: nowrap; }

        /* Team Row */
        .team-grid { display: flex; flex-wrap: nowrap; gap: 15px; justify-content: space-between; margin-bottom: 25px; transition: 0.3s; }
        .team-btn { flex: 1; background: #0a0a0f; border: 2px solid #222; border-radius: 8px; padding: 15px 10px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; filter: grayscale(100%) opacity(0.4); }
        .team-btn:hover { filter: grayscale(50%) opacity(0.8); background: #111; }
        .team-btn.selected { filter: grayscale(0%) opacity(1); border-color: var(--theme-color); box-shadow: inset 0 0 15px rgba(255,255,255,0.05); background: #1a1a24; }
        .team-logo { height: 35px; width: auto; max-width: 100%; object-fit: contain; }

        /* Auth Section */
        #auth-section { display: none; text-align: center; margin-top: 20px; background: #0a0a0f; padding: 30px; border-radius: 8px; border: 1px dashed var(--f1-border); }
        .auth-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 15px; }
        input[type="password"] { padding: 15px; width: 250px; border-radius: 6px; border: 1px solid var(--theme-color); background: #000; color: white; font-family: 'Chakra Petch', monospace; font-size: 18px; text-align: center; outline: none; }
        .login-btn { padding: 15px 30px; background: var(--theme-color); color: #fff; border: none; border-radius: 6px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .login-btn:hover { filter: brightness(1.2); }

        /* Driver Grid */
        #driver-section { display: none; text-align: center; }
        
        /* Radio Check Button */
        #radio-check-btn { display: none; background: #555; color: white; border: 2px solid #777; padding: 12px 25px; border-radius: 6px; font-weight: 900; font-size: 14px; text-transform: uppercase; cursor: pointer; margin: 0 auto 25px auto; transition: 0.3s; width: 100%; max-width: 300px; }
        #radio-check-btn:hover { background: #777; }
        #radio-check-btn.active { background: #e10600; border-color: #ff4444; box-shadow: 0 0 15px rgba(225, 6, 0, 0.5); }

        .driver-grid { display: flex; justify-content: center; gap: 40px; }
        
        /* Driver Cards */
        .driver-card { background: #0a0a0f; border: 2px solid #222; border-radius: 8px; overflow: hidden; width: 220px; cursor: pointer; transition: 0.3s; position: relative; }
        .driver-card.disabled { opacity: 0.4; filter: grayscale(100%); cursor: not-allowed; }
        .driver-card:hover:not(.disabled) { transform: translateY(-5px); border-color: #555; }
        .driver-photo-wrap { width: 100%; height: 220px; background-color: var(--theme-color); position: relative; border-bottom: 2px solid #222; }
        .driver-photo { width: 100%; height: 100%; object-fit: cover; object-position: top center; mix-blend-mode: normal; }
        .driver-name { padding: 15px; font-size: 22px; font-weight: 900; text-transform: uppercase; margin: 0; text-align: center; background: #0a0a0f; }
        
        /* Active Transmission State */
        .driver-card.active { border-color: red; box-shadow: 0 0 25px rgba(255, 0, 0, 0.4); }
        .driver-card.active .driver-name { background: #3a0000; color: #ff4444; }
        .live-led { position: absolute; top: 15px; right: 15px; width: 15px; height: 15px; background: red; border-radius: 50%; box-shadow: 0 0 10px red; display: none; z-index: 10; }
        .driver-card.active .live-led { display: block; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .dash-header { flex-direction: column; gap: 15px; }
            .telemetry-status { width: 100%; box-sizing: border-box; font-size: 14px; white-space: normal; }
            .team-grid { flex-direction: column; gap: 10px; }
            .team-btn { width: 100%; box-sizing: border-box; padding: 20px; }
            .auth-controls { flex-direction: column; width: 100%; }
            input[type="password"] { width: 100%; box-sizing: border-box; }
            .login-btn { width: 100%; margin-left: 0; }
            .driver-grid { flex-direction: column; align-items: center; gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="dashboard" id="main-dash">
        <div class="dash-header">
            <h1 id="dash-title">Pit Wall Control</h1>
            <img id="active-team-logo" src="" alt="Team Logo">
            <div class="telemetry-status" id="telemetry">[ SYS. STANDBY ]</div>
        </div>
        
        <div class="team-grid" id="team-grid">
            <div class="team-btn" onclick="selectTeam('Mercedes', '#00D7B6', 'W15', [{d: 'Rodda', f: 'Rodda'}, {d: 'Kalpa', f: 'Kalpa'}], 'Mercedes', 'MER.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/MER.png" class="team-logo">
            </div>
            <div class="team-btn" onclick="selectTeam('Red Bull', '#4781D7', 'RB2024', [{d: 'Nippa E', f: 'NippaE'}, {d: 'Eranga', f: 'Eranga'}], 'RedBull', 'RB.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/RB.png" class="team-logo">
            </div>
            <div class="team-btn" onclick="selectTeam('Ferrari', '#ED1131', 'SF24', [{d: 'Mapa', f: 'Mapa'}, {d: 'Shiyan', f: 'Shiyan'}], 'Ferrari', 'FER.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/FER.png" class="team-logo">
            </div>
            <div class="team-btn" onclick="selectTeam('McLaren', '#F47600', 'MCL38', [{d: 'Sahan', f: 'Sahan'}, {d: 'Sameera', f: 'Sameera'}], 'Mclaren', 'MCL.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/MCL.png" class="team-logo">
            </div>
            <div class="team-btn" onclick="selectTeam('Aston Martin', '#229971', 'AMR24', [{d: 'Shahan', f: 'Shahan'}, {d: 'Nuwie G', f: 'NuwieG'}], 'AstonMartin', 'AM.png')">
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/AM.png" class="team-logo">
            </div>
        </div>

        <div id="auth-section">
            <h3 style="margin-top:0; color: #888; font-weight: 600; text-transform: uppercase;">Awaiting Authentication</h3>
            <div class="auth-controls">
                <input type="password" id="team-pass" placeholder="Password">
                <button class="login-btn" onclick="authenticate()">Unlock</button>
            </div>
        </div>

        <div id="driver-section">
            <button id="radio-check-btn" onclick="performRadioCheck()">Perform Radio Check</button>
            <div class="driver-grid" id="driver-container">
                </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG (STAYS THE SAME) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCCiZwdBkZBZubr8oVsG8hkNE-x2iq3HJ0",
            authDomain: "f1-lads-team-radio-589fc.firebaseapp.com",
            databaseURL: "https://f1-lads-team-radio-589fc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "f1-lads-team-radio-589fc",
            storageBucket: "f1-lads-team-radio-589fc.firebasestorage.app",
            messagingSenderId: "449577983062",
            appId: "1:449577983062:web:db65755d30d1c6a14ceff7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- STATE VARIABLES ---
        let currentTeam = null; let currentHex = null; let currentPass = null; 
        let currentDrivers = []; let currentFileSuffix = null; let currentLogo = null;
        let activeDriverFile = null; let safetyTimer = null;

        // --- TELEMETRY STATE ---
        let raceState = "PRE-RACE"; // "PRE-RACE", "RACING", "FINISHED"
        let currentLap = 0;
        let lastTransmittedLap = -1; // Tracks usage to enforce 1 per lap

        // 1. SELECT TEAM
        function selectTeam(name, hex, pass, drivers, suffix, logoFile) {
            if(activeDriverFile) return; 
            currentTeam = name; currentHex = hex; currentPass = pass; 
            currentDrivers = drivers; currentFileSuffix = suffix; currentLogo = logoFile;

            document.querySelectorAll('.team-btn').forEach(btn => btn.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.documentElement.style.setProperty('--theme-color', hex);
            
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('team-pass').value = '';
            document.getElementById('team-pass').focus();
        }

        // 2. AUTHENTICATE
        function authenticate() {
            const input = document.getElementById('team-pass').value;
            if (input === currentPass) {
                // UI Transition
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('team-grid').style.display = 'none';
                
                // Shrink Box & Swap Text for Logo
                document.getElementById('main-dash').classList.add('logged-in');
                document.getElementById('dash-title').style.display = 'none';
                const logoEl = document.getElementById('active-team-logo');
                logoEl.src = `https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/${currentLogo}`;
                logoEl.style.display = 'block';
                
                buildDriverGrid();
                document.getElementById('driver-section').style.display = 'block';
                
                evaluateTelemetryState(); // Check if we are pre-race or racing
            } else {
                alert("ACCESS DENIED");
            }
        }

        function buildDriverGrid() {
            const container = document.getElementById('driver-container');
            container.innerHTML = '';
            currentDrivers.forEach(driver => {
                container.innerHTML += `
                    <div class="driver-card" id="card-${driver.f}" onclick="toggleRadio('${driver.f}', '${driver.d}')">
                        <div class="live-led"></div>
                        <div class="driver-photo-wrap">
                            <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/${driver.f}.png" class="driver-photo" onerror="this.style.display='none'">
                        </div>
                        <h3 class="driver-name">${driver.d}</h3>
                    </div>
                `;
            });
        }

        // 3. RADIO CHECK LOGIC
        function performRadioCheck() {
            if (raceState !== "PRE-RACE") return;
            
            // Briefly trigger the first driver's comms for 3 seconds to verify OBS audio/video
            const testDriver = currentDrivers[0];
            updateTelemetry("[ RADIO CHECK ACTIVE ]", "#e10600");
            
            db.ref('radioState').set({
                active: true,
                team: currentTeam,
                video: `${testDriver.f}_${currentFileSuffix}.webm`,
                timestamp: Date.now()
            });

            setTimeout(() => {
                db.ref('radioState').update({ active: false });
                evaluateTelemetryState(); // Reset text back to READY
            }, 3000);
        }

        // 4. MAIN RADIO TOGGLE (WITH RULES)
        function toggleRadio(fileId, displayName) {
            if (activeDriverFile && activeDriverFile !== fileId) return; 
            
            const card = document.getElementById(`card-${fileId}`);
            
            // --- ENFORCE LEAGUE RULES ---
            if (!activeDriverFile) {
                if (raceState === "PRE-RACE") {
                    updateTelemetry("USE RADIO CHECK PRE-RACE", "#F47600");
                    return;
                }
                if (currentLap <= 2) {
                    updateTelemetry(`LOCKED: ON LAP ${currentLap} OF 2`, "#ff4444");
                    return;
                }
                if (currentLap === lastTransmittedLap) {
                    updateTelemetry(`LOCKED: ALREADY USED ON LAP ${currentLap}`, "#ff4444");
                    return;
                }

                // PASSES RULES -> GO LIVE
                activeDriverFile = fileId;
                card.classList.add('active');
                lastTransmittedLap = currentLap; // Log usage for this lap
                updateTelemetry(`[ ON AIR : ${displayName.toUpperCase()} ]`, "#ff4444");
                
                db.ref('radioState').set({
                    active: true,
                    team: currentTeam,
                    video: `${fileId}_${currentFileSuffix}.webm`,
                    timestamp: Date.now()
                });

                safetyTimer = setTimeout(() => { if(activeDriverFile) toggleRadio(activeDriverFile, displayName); }, 12000);
            
            } else {
                // TURN OFF
                clearTimeout(safetyTimer);
                activeDriverFile = null;
                card.classList.remove('active');
                db.ref('radioState').update({ active: false });
                evaluateTelemetryState();
            }
        }

        // 5. TELEMETRY INTEGRATION (pits-n-giggles)
        function updateTelemetry(text, color = "#888") {
            const tel = document.getElementById('telemetry');
            tel.innerText = text;
            tel.style.color = color;
            tel.style.borderColor = color === "#888" ? "#222" : color;
        }

        function evaluateTelemetryState() {
            const checkBtn = document.getElementById('radio-check-btn');
            const cards = document.querySelectorAll('.driver-card');

            if (raceState === "PRE-RACE") {
                updateTelemetry("[ READY: PRE-RACE ]", "#00D7B6");
                checkBtn.style.display = "block";
                checkBtn.classList.add("active");
                cards.forEach(c => c.classList.add('disabled')); // Disable real comms
            } else if (raceState === "RACING") {
                checkBtn.style.display = "none";
                cards.forEach(c => c.classList.remove('disabled'));
                
                if (currentLap <= 2) {
                    updateTelemetry(`[ LOCKED: LAP ${currentLap} ]`, "#ff4444");
                } else if (currentLap === lastTransmittedLap) {
                    updateTelemetry(`[ LOCKED: LAP ${currentLap} USED ]`, "#F47600");
                } else {
                    updateTelemetry(`[ READY: LAP ${currentLap} ]`, "#00D7B6");
                }
            }
        }

        // --- CONNECT TO telemetry.f1lads.com ---
        // Pits-n-giggles generally broadcasts via WebSocket. 
        // Adjust the wss:// URL if your server uses a specific port (e.g., :8080)
        
        function connectToTelemetry() {
            try {
                const ws = new WebSocket('wss://telemetry.f1lads.com');
                
                ws.onopen = () => console.log("Connected to F1 Telemetry");
                
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    
                    // NOTE: These variable names depend on your specific F1 game year format in pits-n-giggles.
                    // Packet 1 = Session Data, Packet 2 = Lap Data
                    
                    if (data.packetId === 1 && data.sessionType) {
                        // Check if session is active (e.g., SessionType 10 = Race)
                        // This determines if we are PRE-RACE or RACING
                        // Replace logic below with exact pits-n-giggles session state flags
                        if (data.sessionTime > 0 && !data.isPaused) {
                            raceState = "RACING";
                        } else {
                            raceState = "PRE-RACE";
                        }
                    }

                    if (data.packetId === 2 && data.lapData) {
                        // Assuming data.lapData is an array of cars. You need to map this to the player's car.
                        // Usually, the host car is index 0, or defined in Packet 0.
                        const newLap = data.lapData[0].currentLapNum; 
                        
                        if (newLap !== currentLap) {
                            currentLap = newLap;
                            if(!activeDriverFile) evaluateTelemetryState(); // Update UI if not currently talking
                        }
                    }
                };

                ws.onclose = () => {
                    updateTelemetry("[ TELEMETRY OFFLINE ]", "#ff4444");
                    // Auto-reconnect after 5 seconds
                    setTimeout(connectToTelemetry, 5000);
                };
            } catch (error) {
                console.error("Telemetry error. Ensure wss:// is running.", error);
            }
        }

        // Initialize connection
        connectToTelemetry();

    </script>
</body>
</html>
