<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Lads | Unified Broadcast Graphics</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* ==========================================
           1. CORE FONTS & VARIABLES
           ========================================== */
        @font-face { font-family: 'Formula1'; src: url('Formula1-Black.ttf') format('truetype'); }
        @font-face { font-family: 'Northwell'; src: url('Northwell.ttf') format('truetype'); }
        @font-face { font-family: 'KHInterference'; src: url('KHInterferenceTRIAL-Bold.otf') format('opentype'); }

        :root {
            /* Shared Colors */
            --bg-base: #060609; 
            --f1-red: #e10600; 
            --city-red: #FF2400; 
            --spine-yellow: #EDF864;
            --drs-green: #00FF41; 
            --deploy-orange: #FF5A00; 
            
            /* 🔥 THE MISSING GAP COLORS ADDED HERE */
            --gap-green: #00FF41;
            --gap-red: #FF1E1E;
            
            /* Battle Focus Glass Backgrounds */
            --glass-base: rgba(12, 13, 18, 0.75);
            --glass-dark: rgba(8, 9, 12, 0.85);

            /* Fonts */
            --font-main: 'Formula1', sans-serif; 
            --font-brush: 'Northwell', cursive; 
            --font-tech: 'KHInterference', sans-serif;
        }

        * { box-sizing: border-box; }
        
        /* 1920x1080 LOCK */
        body { 
            margin: 0; padding: 0; width: 1920px; height: 1080px; 
            overflow: hidden; background-color: transparent; 
            color: #fff; font-family: var(--font-main); 
        }

        /* SCENE MANAGER */
        .scene {
            position: absolute; top: 0; left: 0; width: 1920px; height: 1080px;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        .scene.active { opacity: 1; pointer-events: auto; }

        /* ==========================================
           2. STARTING GRID STYLES
           ========================================== */
        #grid-scene { background-color: var(--bg-base); }
        .texture-dots { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.15; background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 20px 20px; }
        .texture-scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.05; background: repeating-linear-gradient(45deg, transparent, transparent 10px, #ffffff 10px, #ffffff 20px); }
        
        #scroller-track { position: absolute; top: 0; left: 0; width: 1920px; display: flex; flex-direction: column; z-index: 5; }
        .grid-section { width: 1920px; height: 1080px; position: relative; flex-shrink: 0; overflow: hidden; }

        @keyframes zoomOutCenter { 0% { transform: translate(-50%, -50%) scale(4.6); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes zoomOutSpine { 0% { transform: translateX(-50%) scale(4.6); opacity: 0; } 100% { transform: translateX(-50%) scale(1); opacity: 1; } }
        @keyframes cityRevealLeftToRight { 0% { clip-path: inset(0 100% 0 0); opacity: 0; } 40% { opacity: 1; } 100% { clip-path: inset(0 -20% 0 -20%); opacity: 1; } }

        .animate-zoom-center { animation: zoomOutCenter 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
        .animate-zoom-spine { animation: zoomOutSpine 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
        .animate-city-reveal { animation: cityRevealLeftToRight 1.2s 1s cubic-bezier(0.2, 0.8, 0.2, 1) both; }

        .intro-logo { position: absolute; left: 50%; top: 40%; transform: translate(-50%, -50%); max-width: 230px; max-height: 153px; object-fit: contain; filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); z-index: 10; }
        .intro-title { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 100px; letter-spacing: 4px; margin: 0; white-space: nowrap; z-index: 10; }
        .intro-city { position: absolute; left: 50%; top: 60%; transform: translate(-50%, -50%); font-family: var(--font-brush); font-size: 93px; color: var(--city-red); margin: 0; white-space: nowrap; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); z-index: 11; }

        .spine-center-wrapper { position: absolute; left: 50%; top: 0; bottom: 0; transform: translateX(-50%); width: 52px; display: flex; flex-direction: column; align-items: center; z-index: 110; }
        .spine-block-top { width: 100%; height: 357px; position: absolute; top: 0; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 calc(100% - 45px)); display: flex; justify-content: space-between; }
        .spine-block-bottom { width: 100%; height: 382px; position: absolute; bottom: 0; clip-path: polygon(0 0, 100% 45px, 100% 100%, 0 100%); display: flex; justify-content: space-between; }
        .spine-segment { width: 23px; height: 100%; background-color: var(--f1-red); box-shadow: 0 0 10px rgba(225, 6, 0, 0.5); flex-shrink: 0; }
        .driver-spine-top { height: 323px; }
        .driver-spine-bottom { height: 310px; }
        .spine-vertical-text { position: absolute; top: 50%; transform: translateY(-50%) rotate(180deg); writing-mode: vertical-rl; font-family: var(--font-tech); font-size: 30px; color: var(--spine-yellow); letter-spacing: 4px; white-space: nowrap; text-shadow: 0 0 15px rgba(237, 248, 100, 0.4); z-index: 50; }

        .driver-half { position: absolute; top: 0; width: 50%; height: 100%; }
        .left-side { left: 0; } .right-side { right: 0; }
        .team-glow { position: absolute; bottom: 0; left: 0; width: 100%; height: 85%; z-index: 1; background: linear-gradient(to top, var(--team-color) 0%, rgba(0,0,0,0) 100%); opacity: 0.95; }
        .bottom-fade { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; z-index: 15; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 50%, transparent 100%); pointer-events: none; }
        
        .edge-sidebar { position: absolute; top: 0; bottom: 0; width: 60px; background: #050508; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 40; gap: 30px; }
        .left-side .edge-sidebar { left: 0; border-right: 1px solid rgba(255,255,255,0.1); } .right-side .edge-sidebar { right: 0; border-left: 1px solid rgba(255,255,255,0.1); }
        .sidebar-team-name { font-size: 20px; color: #fff; writing-mode: vertical-rl; letter-spacing: 3px; white-space: nowrap; transform: rotate(180deg); }
        .sidebar-logo { width: 38px; height: auto; object-fit: contain; }
        
        .grid-driver-photo { position: absolute; bottom: 0; top: 12px; height: 140%; object-fit: contain; z-index: 10; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8)); }
        .left-side .grid-driver-photo { left: calc(60px + (100% - 150px) / 2); transform: translateX(-50%); } 
        .right-side .grid-driver-photo { right: calc(60px + (100% - 150px) / 2); transform: translateX(50%); }

        .pos-number { position: absolute; font-family: var(--font-tech); font-size: 188px; color: #fff; z-index: 30; text-shadow: 0 10px 20px rgba(0, 0, 0, 0.5); line-height: 1; display: flex; white-space: nowrap; }
        .left-side .pos-number { top: 493px; left: 675px; } 
        .right-side .pos-number { top: 586px; right: 675px; } 
        .right-side .pos-number.pos-10 { right: 562px; }
        .pos-number.pos-dsq { color: #ff0000; }
        .left-side .pos-number.pos-dsq { left: 562px; } 
        .right-side .pos-number.pos-dsq { right: 565px; }
        .pos-suffix { font-size: 90px; margin-top: 30px; }

        .name-container { position: absolute; bottom: 10%; z-index: 30; display: flex; flex-direction: column; align-items: center; white-space: nowrap; }
        .left-side .name-container { left: calc(60px + (100% - 150px) / 2); transform: translateX(-50%); } 
        .right-side .name-container { right: calc(60px + (100% - 150px) / 2); transform: translateX(50%); }
        .last-name { font-family: var(--font-main); font-size: 82px; color: var(--team-color); text-transform: uppercase; line-height: 0.8; z-index: 1; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .first-name { font-family: var(--font-brush); font-size: 85px; color: #fff; text-transform: capitalize; line-height: 0.5; z-index: 2; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); position: relative; left: -15px; top: 8px; }

        /* ==========================================
           3. BATTLE FOCUS STYLES
           ========================================== */
        #battle-scene { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 50px; }
        
        .bf-logo { height: 55px; object-fit: contain; margin-bottom: 15px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.8)); z-index: 50; transition: opacity 0.3s; }
        .battle-container { width: 1150px; display: flex; flex-direction: column; position: relative; z-index: 10; border-radius: 20px; box-shadow: 0 20px 35px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1); transform: translateY(20px); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        #battle-scene.active .battle-container { transform: translateY(0); }

        .top-bar { width: 100%; height: 75px; display: flex; justify-content: space-between; align-items: center; background: var(--glass-dark); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); position: relative; z-index: 20; border-bottom: 1px solid rgba(255,255,255,0.05); border-radius: 20px 20px 0 0; overflow: hidden; }
        .driver-header { flex: 1; height: 100%; display: flex; align-items: center; padding: 0 30px; gap: 15px; position: relative; overflow: visible; }
        
        .bg-gradient { position: absolute; top: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.8; }
        .header-left .bg-gradient { left: 0; background: linear-gradient(90deg, var(--team-color) 0%, transparent 90%); border-top-left-radius: 20px; }
        .header-right .bg-gradient { right: 0; background: linear-gradient(270deg, var(--team-color) 0%, transparent 90%); border-top-right-radius: 20px; }
        .header-right { flex-direction: row-reverse; }

        .bf-driver-photo { position: absolute; bottom: -50px; height: 280px; z-index: 0; opacity: 0.20; scale: 2.5; -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 90%); mask-image: linear-gradient(to bottom, black 50%, transparent 90%); }
        .header-left .bf-driver-photo { left: 80px; }
        .header-right .bf-driver-photo { right: 80px; }

        .team-logo { height: 42px; object-fit: contain; z-index: 2; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8)); }
        .driver-name { font-size: 36px; letter-spacing: 2px; margin-top: 5px; z-index: 2; text-shadow: 0 4px 10px rgba(0,0,0,0.9); }

        .center-interval { width: 320px; height: 100%; background: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.95) 20%, rgba(0,0,0,0.95) 80%, transparent 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; }
        .interval-val { font-family: var(--font-tech); font-size: 50px; letter-spacing: 1px; transition: color 0.3s, text-shadow 0.3s; }
        .small-s { font-size: 0.5em; color: #888; margin-left: 2px; }
        
        /* Forces the override with !important */
        .gap-decreasing { color: var(--gap-green) !important; text-shadow: 0 0 15px rgba(0,255,65,0.5) !important; }
        .gap-increasing { color: var(--gap-red) !important; text-shadow: 0 0 15px rgba(255,30,30,0.5) !important; }

        .bottom-bar { width: 100%; height: 140px; background: var(--glass-base); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; border-radius: 0 0 20px 20px; }
        .bf-texture-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.15; background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 10px 10px; pointer-events: none; }

        .telemetry-block { width: 350px; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 35px; z-index: 10; }
        .tel-right { flex-direction: row-reverse; }

        .speed-box { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .speed-val { font-family: var(--font-tech); font-size: 52px; line-height: 1; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .speed-unit { font-family: var(--font-tech); font-size: 18px; color: #E0E0E0; letter-spacing: 2px; margin-top: -2px; font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .tabs-stack { display: flex; flex-direction: column; gap: 8px; }
        .status-tab { width: 130px; height: 36px; background: rgba(0,0,0,0.5); border: 2px solid #333; border-radius: 4px; font-family: var(--font-tech); font-size: 18px; color: #666; display: flex; justify-content: center; align-items: center; transition: all 0.2s ease; }

        @keyframes pulseDrsActive { 0% { background-color: rgba(0, 255, 65, 0.6); box-shadow: 0 0 10px var(--drs-green); color: #fff; border-color: var(--drs-green); } 100% { background-color: var(--drs-green); box-shadow: 0 0 35px var(--drs-green), inset 0 0 15px var(--drs-green); color: #000; border-color: #fff; } }
        @keyframes pulseOvtActive { 0% { background-color: rgba(255, 90, 0, 0.6); box-shadow: 0 0 10px var(--deploy-orange); color: #fff; border-color: var(--deploy-orange); } 100% { background-color: var(--deploy-orange); box-shadow: 0 0 35px var(--deploy-orange), inset 0 0 15px var(--deploy-orange); color: #fff; border-color: #fff; text-shadow: 0 0 8px #fff; } }

        .tab-drs.active { animation: pulseDrsActive 0.6s infinite alternate ease-in-out !important; font-weight: bold; }
        .tab-ovt.active { animation: pulseOvtActive 0.6s infinite alternate ease-in-out !important; font-weight: bold; }

        .battery-hub { width: 450px; height: 100%; display: flex; align-items: center; justify-content: center; gap: 20px; z-index: 10; }
        .hub-percent { font-family: var(--font-tech); font-size: 55px; width: 130px; text-align: center; font-weight: bold; transition: color 0.3s ease; font-variant-numeric: tabular-nums; flex-shrink: 0; }
        .hub-lightning { font-family: var(--font-tech); font-size: 32px; color: #555; }

        .battery-container { display: flex; flex-direction: column; align-items: center; padding-bottom: 5px; }
        .battery-nub { width: 22px; height: 6px; background: #888; border-radius: 4px 4px 0 0; }
        .battery-shell { width: 50px; height: 95px; border: 3px solid #888; border-radius: 6px; padding: 3px; display: flex; align-items: flex-end; position: relative; overflow: hidden; transition: all 0.3s ease; background: rgba(0,0,0,0.4); --glow-color: #888; }
        .battery-juice { width: 100%; border-radius: 2px; transition: height 0.3s linear, background-color 0.3s ease; }

        @keyframes batteryGlowPulse { 0% { box-shadow: 0 0 10px var(--glow-color), inset 0 0 5px var(--glow-color); border-color: var(--glow-color); } 100% { box-shadow: 0 0 40px var(--glow-color), inset 0 0 20px var(--glow-color); border-color: #fff; } }
        .battery-shell.deploying { animation: batteryGlowPulse 0.6s infinite alternate ease-in-out; }

    </style>
</head>
<body>

    <div class="scene" id="grid-scene">
        <div class="texture-dots"></div>
        <div class="texture-scanlines"></div>
        <div id="scroller-track"></div>
    </div>

    <div class="scene" id="battle-scene">
        <img class="bf-logo" src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/Logo.png">
        <div class="battle-container">
            <div class="top-bar">
                <div class="driver-header header-left" id="bf-left-header" style="--team-color: var(--ferrari);">
                    <div class="bg-gradient"></div>
                    <img class="bf-driver-photo" id="bf-left-photo" src="" onerror="this.style.display='none'">
                    <img class="team-logo" id="bf-left-logo" src="">
                    <div class="driver-name" id="bf-left-name">MAPA</div>
                </div>

                <div class="center-interval">
                    <div class="interval-val" id="live-gap">+0.000<span class="small-s">s</span></div>
                </div>

                <div class="driver-header header-right" id="bf-right-header" style="--team-color: var(--redbull);">
                    <div class="bg-gradient"></div>
                    <img class="bf-driver-photo" id="bf-right-photo" src="" onerror="this.style.display='none'">
                    <img class="team-logo" id="bf-right-logo" src="">
                    <div class="driver-name" id="bf-right-name">NIPPA E</div>
                </div>
            </div>

            <div class="bottom-bar">
                <div class="bf-texture-grid"></div>

                <div class="telemetry-block tel-left">
                    <div class="speed-box">
                        <div class="speed-val" id="left-speed">0</div>
                        <div class="speed-unit">KM/H</div>
                    </div>
                    <div class="tabs-stack">
                        <div class="status-tab tab-drs" id="left-drs">DRS</div>
                        <div class="status-tab tab-ovt" id="left-ovt">OVERTAKE</div>
                    </div>
                </div>

                <div class="battery-hub">
                    <div class="hub-percent" id="left-percent">0%</div>
                    
                    <div class="battery-container">
                        <div class="battery-nub"></div>
                        <div class="battery-shell" id="left-batt-shell">
                            <div class="battery-juice" id="left-batt-juice" style="height: 0%;"></div>
                        </div>
                    </div>
                    
                    <div class="hub-lightning">⚡</div>
                    
                    <div class="battery-container">
                        <div class="battery-nub"></div>
                        <div class="battery-shell" id="right-batt-shell">
                            <div class="battery-juice" id="right-batt-juice" style="height: 0%;"></div>
                        </div>
                    </div>

                    <div class="hub-percent" id="right-percent">0%</div>
                </div>

                <div class="telemetry-block tel-right">
                    <div class="speed-box">
                        <div class="speed-val" id="right-speed">0</div>
                        <div class="speed-unit">KM/H</div>
                    </div>
                    <div class="tabs-stack">
                        <div class="status-tab tab-drs" id="right-drs">DRS</div>
                        <div class="status-tab tab-ovt" id="right-ovt">OVERTAKE</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // SHARED ROSTER DATABASE
        // ==========================================
        const rosterDB = {
            "M. MAPA": { first: "Madhawa", last: "MAPA", team: "FERRARI", color: "#ED1131", photo: "Mapa", logo: "FER.png" },
            "SHIYANK88": { first: "Kekulkotawage", last: "SHIYAN", team: "FERRARI", color: "#ED1131", photo: "Shiyan", logo: "FER.png" },
            "NUWIRODDA": { first: "Nuwi", last: "RODDA", team: "MERCEDES", color: "#00D7B6", photo: "Rodda", logo: "MER.png" },
            "PRODIGY__V2": { first: "Keragala", last: "KALPA", team: "MERCEDES", color: "#00D7B6", photo: "Kalpa", logo: "MER.png" },
            "LAFORET": { first: "Wimalagunaratna", last: "SAHAN", team: "MCLAREN", color: "#F47600", photo: "Sahan", logo: "MCL.png" },
            "S. MALIMBADA": { first: "Malimbada", last: "SAMEERA", team: "MCLAREN", color: "#F47600", photo: "Sameera", logo: "MCL.png" },
            "NUWIE_G": { first: "Gamage", last: "NUWIE G", team: "ASTON MARTIN", color: "#229971", photo: "NuwieG", logo: "AM.png" },
            "SHAHANW": { first: "Withanage", last: "SHAHAN", team: "ASTON MARTIN", color: "#229971", photo: "Shahan", logo: "AM.png" },
            "RACER4965": { first: "Ekanayake", last: "NIPPA E", team: "RED BULL", color: "#4781D7", photo: "NippaE", logo: "RB.png" },
            "BIGDADDYE3002": { first: "Pelpola", last: "ERANGA", team: "RED BULL", color: "#4781D7", photo: "Eranga", logo: "RB.png" }
        };

        function getDriverProfile(gameId) {
            let cleanIncoming = gameId.toUpperCase().replace(/[^A-Z0-9]/g, '');
            for (let key in rosterDB) {
                let cleanKey = key.replace(/[^A-Z0-9]/g, '');
                if (cleanIncoming.includes(cleanKey) || cleanKey.includes(cleanIncoming)) {
                    return rosterDB[key];
                }
            }
            return { first: "Unknown", last: gameId.substring(0,8), team: "FIA", color: "#ffffff", photo: "Mapa", logo: "Logo.png" };
        }

        // ==========================================
        // STARTING GRID LOGIC
        // ==========================================
        const track = document.getElementById('scroller-track');
        const gridScene = document.getElementById('grid-scene');

        function getOrdinal(n) {
            if (n === "DSQ") return "";
            const s = ["th", "st", "nd", "rd"];
            const v = n % 100;
            return s[(v - 20) % 10] || s[v] || s[0];
        }

        function generateDriverHTML(driver, side) {
            if (!driver) return `<div class="driver-half ${side}-side"></div>`; 
            const isDSQ = driver.pos === "DSQ";
            const displayPos = isDSQ ? "DSQ" : driver.pos;
            const ordinal = isDSQ ? "" : `<span class="pos-suffix">${getOrdinal(driver.pos)}</span>`;
            let positionClass = isDSQ ? " pos-dsq" : (driver.pos === 10 ? " pos-10" : "");

            return `
                <div class="driver-half ${side}-side" style="--team-color: ${driver.color}">
                    <div class="team-glow"></div>
                    <div class="bottom-fade"></div>
                    <div class="edge-sidebar">
                        <div class="sidebar-team-name">${driver.team}</div>
                        <img class="sidebar-logo" src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/${driver.logo}">
                    </div>
                    <div class="pos-number${positionClass}">${displayPos}${ordinal}</div>
                    <img class="grid-driver-photo" src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/${driver.photo}.png" onerror="this.style.display='none'">
                    <div class="name-container">
                        <div class="first-name">${driver.first}</div>
                        <div class="last-name">${driver.last}</div>
                    </div>
                </div>
            `;
        }

        function buildAndPlayGrid(liveGridData, trackName) {
            document.getElementById('battle-scene').classList.remove('active');
            
            track.style.transition = 'none';
            track.style.transform = `translateY(0)`;
            track.innerHTML = '';
            void track.offsetWidth; 
            track.style.transition = 'transform 1.2s cubic-bezier(0.25, 1, 0.5, 1)';

            let finalGrid = liveGridData.map(rawDriver => {
                let profile = getDriverProfile(rawDriver.gameId);
                return { ...profile, pos: rawDriver.position };
            });

            const displayCity = trackName ? trackName : "Qualifying Result";

            const introDiv = document.createElement('div');
            introDiv.className = 'grid-section';
            introDiv.innerHTML = `
                <div class="spine-center-wrapper animate-zoom-spine">
                    <div class="spine-block-top"><div class="spine-segment"></div><div class="spine-segment"></div></div>
                    <div class="spine-block-bottom"><div class="spine-segment"></div><div class="spine-segment"></div></div>
                </div>
                <img src="https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/Logo.png" class="intro-logo animate-zoom-center" alt="Logo">
                <div class="intro-title animate-zoom-center">STARTING GRID</div>
                <div class="intro-city animate-city-reveal">${displayCity}</div>
            `;
            track.appendChild(introDiv);

            const driverRows = Math.ceil(finalGrid.length / 2);
            for (let i = 0; i < finalGrid.length; i += 2) {
                const section = document.createElement('div');
                section.className = 'grid-section';
                section.innerHTML = `
                    <div class="spine-center-wrapper">
                        <div class="spine-block-top driver-spine-top"><div class="spine-segment"></div><div class="spine-segment"></div></div>
                        <div class="spine-vertical-text">STARTING GRID</div>
                        <div class="spine-block-bottom driver-spine-bottom"><div class="spine-segment"></div><div class="spine-segment"></div></div>
                    </div>
                    ${generateDriverHTML(finalGrid[i], 'left')}
                    ${generateDriverHTML(finalGrid[i+1], 'right')}
                `;
                track.appendChild(section);
            }

            gridScene.classList.add('active');
            
            setTimeout(() => {
                let currentRowIndex = 0;
                function scrollNext() {
                    if (currentRowIndex < driverRows) {
                        currentRowIndex++;
                        track.style.transform = `translateY(-${currentRowIndex * 1080}px)`;
                        setTimeout(scrollNext, 5000); 
                    } else {
                        setTimeout(() => { gridScene.classList.remove('active'); }, 6000);
                    }
                }
                setTimeout(scrollNext, 4500); 
            }, 500);
        }

        // ==========================================
        // BATTLE FOCUS LOGIC
        // ==========================================
        let previousGap = 0;

        function getSolidBatteryColor(percent) {
            if (percent > 50) return '#00FF41'; 
            if (percent < 20) return '#FF1E1E'; 
            const hue = ((percent - 20) / 30) * 60; 
            return `hsl(${hue}, 100%, 50%)`;
        }

        function updateERS(side, percentage, isDeploying) {
            const juice = document.getElementById(`${side}-batt-juice`);
            const shell = document.getElementById(`${side}-batt-shell`);
            const textPct = document.getElementById(`${side}-percent`);
            
            juice.style.height = `${percentage}%`;
            textPct.innerText = `${Math.round(percentage)}%`;

            const liveColor = getSolidBatteryColor(percentage);
            juice.style.backgroundColor = liveColor;
            textPct.style.color = liveColor;

            shell.style.setProperty('--glow-color', liveColor);
            if (isDeploying) shell.classList.add('deploying'); else shell.classList.remove('deploying');
        }

        function updateTabs(side, drsActive, ovtActive) {
            const drsTab = document.getElementById(`${side}-drs`);
            const ovtTab = document.getElementById(`${side}-ovt`);
            if(drsActive) drsTab.classList.add('active'); else drsTab.classList.remove('active');
            if(ovtActive) ovtTab.classList.add('active'); else ovtTab.classList.remove('active');
        }

        function populateBattleFocus(data) {
            // Driver Identities
            const p1 = getDriverProfile(data.driver1.gameId);
            const p2 = getDriverProfile(data.driver2.gameId);

            document.getElementById('bf-left-header').style.setProperty('--team-color', p1.color);
            document.getElementById('bf-left-name').innerText = p1.last;
            document.getElementById('bf-left-photo').src = `https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/${p1.photo}.png`;
            document.getElementById('bf-left-photo').style.display = 'block';
            document.getElementById('bf-left-logo').src = `https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/${p1.logo}`;

            document.getElementById('bf-right-header').style.setProperty('--team-color', p2.color);
            document.getElementById('bf-right-name').innerText = p2.last;
            document.getElementById('bf-right-photo').src = `https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/${p2.photo}.png`;
            document.getElementById('bf-right-photo').style.display = 'block';
            document.getElementById('bf-right-logo').src = `https://raw.githubusercontent.com/f1ladsleague/landing-page/main/Team_Photos/${p2.logo}`;

            // Telemetry
            document.getElementById('left-speed').innerText = data.driver1.speed;
            document.getElementById('right-speed').innerText = data.driver2.speed;
            
            updateERS('left', data.driver1.ers, data.driver1.deploying);
            updateERS('right', data.driver2.ers, data.driver2.deploying);

            updateTabs('left', data.driver1.drs, data.driver1.deploying);
            updateTabs('right', data.driver2.drs, data.driver2.deploying);

            // 🔥 UPGRADED GAP MATH
            const gapEl = document.getElementById('live-gap');
            const currentGap = parseFloat(data.gap); 
            
            gapEl.innerHTML = `+${currentGap.toFixed(3)}<span class="small-s">s</span>`;
            
            // Ignore the very first tick to prevent a false "Red" flash
            if (previousGap !== 0 && currentGap !== previousGap) {
                if (currentGap < previousGap) {
                    gapEl.classList.add('gap-decreasing'); 
                    gapEl.classList.remove('gap-increasing');
                } else if (currentGap > previousGap) {
                    gapEl.classList.add('gap-increasing'); 
                    gapEl.classList.remove('gap-decreasing');
                }
            }
            
            // Only save valid numbers for the next tick
            if (!isNaN(currentGap)) {
                previousGap = currentGap;
            }
        }

        // ==========================================
        // FIREBASE INITIALIZATION & LISTENERS
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCCiZwdBkZBZubr8oVsG8hkNE-x2iq3HJ0",
            authDomain: "f1-lads-team-radio-589fc.firebaseapp.com",
            databaseURL: "https://f1-lads-team-radio-589fc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "f1-lads-team-radio-589fc"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // 1. Starting Grid Listener
        let lastGridTimestamp = null;
        db.ref('startingGrid/timestamp').once('value').then((snapshot) => {
            lastGridTimestamp = snapshot.val() || 0;
            db.ref('startingGrid').on('value', (liveSnap) => {
                const gridInfo = liveSnap.val();
                if (gridInfo && gridInfo.trigger && gridInfo.timestamp > lastGridTimestamp) {
                    lastGridTimestamp = gridInfo.timestamp;
                    buildAndPlayGrid(gridInfo.data, gridInfo.trackName);
                }
            });
        });

        // 2. Battle Focus Listener
        db.ref('battleFocusLive').on('value', (snapshot) => {
            const bfData = snapshot.val();
            const battleScene = document.getElementById('battle-scene');

            if (bfData && bfData.show) {
                gridScene.classList.remove('active'); 
                populateBattleFocus(bfData);
                battleScene.classList.add('active');
            } else {
                battleScene.classList.remove('active');
                previousGap = 0; // Reset the gap memory when graphic hides
            }
        });

    </script>
</body>
</html>
