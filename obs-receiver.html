<!DOCTYPE html>
<html>
<head>
    <title>OBS Radio Receiver</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: transparent; color: #00D7B6; font-family: sans-serif; padding: 10px; font-weight: bold; }
        #box { background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; border-left: 5px solid #00D7B6; display: inline-block; min-width: 200px; }
        .busy { border-left-color: #ff4444 !important; color: #ff4444 !important; }
    </style>
</head>
<body>
    <div id="box">📻 RADIO TOWER: STARTING...</div>
    <div id="audio-container"></div>

    <script>
        const peer = new Peer('f1lads-hq-tower-8844');
        const box = document.getElementById('box');

        peer.on('open', () => { box.innerText = "📻 RADIO TOWER: LIVE"; });

        peer.on('call', (call) => {
            box.innerText = "🎙️ INCOMING TRANSMISSION...";
            box.classList.add('busy');
            call.answer(); 
            call.on('stream', (remoteStream) => {
                const audio = document.createElement('audio');
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                document.getElementById('audio-container').appendChild(audio);

                call.on('close', () => {
                    audio.remove();
                    box.innerText = "📻 RADIO TOWER: LIVE";
                    box.classList.remove('busy');
                });
            });
        });

        peer.on('error', (err) => { box.innerText = "❌ PEER ERROR: " + err.type; });
    </script>
</body>
</html>
