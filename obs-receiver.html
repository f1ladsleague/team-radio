<!DOCTYPE html>
<html>
<head>
    <title>OBS Radio Receiver</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: transparent; color: #00D7B6; font-family: sans-serif; padding: 10px; font-weight: bold; }
        #box { background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; border-left: 5px solid #00D7B6; display: inline-block; min-width: 200px; text-transform: uppercase; }
        .busy { border-left-color: #ff4444 !important; color: #ff4444 !important; }
    </style>
</head>
<body>
    <div id="box">📻 RADIO TOWER: STARTING...</div>

    <script>
        // --- 1. FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCCiZwdBkZBZubr8oVsG8hkNE-x2iq3HJ0",
            authDomain: "f1-lads-team-radio-589fc.firebaseapp.com",
            databaseURL: "https://f1-lads-team-radio-589fc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "f1-lads-team-radio-589fc",
            storageBucket: "f1-lads-team-radio-589fc.firebasestorage.app",
            messagingSenderId: "449577983062",
            appId: "1:449577983062:web:db65755d30d1c6a14ceff7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Keep track of who is currently calling
        let currentTeam = "Mercedes";
        db.ref('radioState').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.active) {
                currentTeam = data.team;
            }
        });

        // --- 2. AUDIO STING SETUP ---
        // Make sure this URL matches your exact Github repository path!
        const GITHUB_BASE_URL = "https://raw.githubusercontent.com/f1ladsleague/F1-Radio-System/main/";
        
        // Map the team names to your new MP3 files
        const stingFiles = {
            "Mercedes": "MercedesTeamRadio.mp3",
            "Red Bull": "RedBullTeamRadio.mp3",
            "Ferrari": "FerrariTeamRadio.mp3",
            "McLaren": "MclarenTeamRadio.mp3",
            "Aston Martin": "AstonMartinTeamRadio.mp3"
        };

        const peer = new Peer('f1lads-hq-tower-8844');
        const box = document.getElementById('box');
        
        // Setup Web Audio API for Radio Distortion + Delay
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function makeDistortionCurve(amount) {
            let k = typeof amount === 'number' ? amount : 50,
                n_samples = 44100,
                curve = new Float32Array(n_samples),
                deg = Math.PI / 180,
                i = 0, x;
            for ( ; i < n_samples; ++i ) {
                x = i * 2 / n_samples - 1;
                curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) );
            }
            return curve;
        }

        peer.on('open', () => { box.innerText = "📻 RADIO TOWER: LIVE"; });

        peer.on('call', (call) => {
            box.innerText = `🎙️ INCOMING: ${currentTeam}`;
            box.classList.add('busy');
            call.answer(); 
            
            // 1. Play the Team Intro Sting IMMEDIATELY (Clean Audio, no distortion)
            const stingUrl = GITHUB_BASE_URL + stingFiles[currentTeam];
            const stingAudio = new Audio(stingUrl);
            stingAudio.volume = 1.0;
            stingAudio.play().catch(e => console.error("Audio block:", e));
            
            // 2. Process the incoming Engineer microphone
            call.on('stream', (remoteStream) => {
                const source = audioCtx.createMediaStreamSource(remoteStream);
                
                // --- THE MAGIC DELAY BUFFER ---
                // Buffers the mic audio for 2.5 seconds while the intro sting plays.
                // If your stings are longer/shorter, change the '2.5' below!
                const delayNode = audioCtx.createDelay(5.0); 
                delayNode.delayTime.value = 2.5; 
                
                // Radio EQ
                const bandpass = audioCtx.createBiquadFilter();
                bandpass.type = "bandpass";
                bandpass.frequency.value = 1200; 
                bandpass.Q.value = 1.2;

                // Radio Crackle/Distortion
                const distortion = audioCtx.createWaveShaper();
                distortion.curve = makeDistortionCurve(40); 
                distortion.oversample = '4x';

                // Connect the chain: Mic -> Delay Buffer -> EQ -> Distortion -> OBS Output
                source.connect(delayNode);
                delayNode.connect(bandpass);
                bandpass.connect(distortion);
                distortion.connect(audioCtx.destination);

                call.on('close', () => {
                    source.disconnect();
                    box.innerText = "📻 RADIO TOWER: LIVE";
                    box.classList.remove('busy');
                });
            });
        });

        peer.on('error', (err) => { box.innerText = "❌ PEER ERROR: " + err.type; });
    </script>
</body>
</html>
