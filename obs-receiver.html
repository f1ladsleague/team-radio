<!DOCTYPE html>
<html>
<head>
    <title>Pitwall Receiver</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: transparent; color: #00D7B6; font-family: monospace; padding: 10px; font-weight: bold; font-size: 14px; }
        #box { background: rgba(0,0,0,0.85); padding: 12px; border-radius: 4px; border-left: 5px solid #00D7B6; display: inline-block; min-width: 250px; text-transform: uppercase; letter-spacing: 1px; }
        .busy { border-left-color: #ff4444 !important; color: #ff4444 !important; }
        
        /* The Unlock Screen Overlay */
        #unlock-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(225, 6, 0, 0.95); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; cursor: pointer; z-index: 9999;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="unlock-overlay" onclick="unlockAudio()">CLICK ANYWHERE TO UNLOCK TEAM RADIO</div>

    <div id="box">[ SYS ] INITIALIZING RECEIVER...</div>
    
    <audio id="live-voice" autoplay controls style="margin-top: 15px; width: 250px; display: block;"></audio>

    <script>
        // 1. Bypass Browser Autoplay Security
        function unlockAudio() {
            const silentAudio = new Audio();
            silentAudio.play().catch(e => {}); 
            document.getElementById('unlock-overlay').style.display = 'none';
            console.log("Audio Unlocked! Ready to receive.");
        }

        // 2. Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyCCiZwdBkZBZubr8oVsG8hkNE-x2iq3HJ0",
            authDomain: "f1-lads-team-radio-589fc.firebaseapp.com",
            databaseURL: "https://f1-lads-team-radio-589fc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "f1-lads-team-radio-589fc",
            storageBucket: "f1-lads-team-radio-589fc.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const GITHUB_BASE_URL = "https://raw.githubusercontent.com/f1ladsleague/team-radio/main/F1-Radio-System/";
        const stingFiles = {
            "Mercedes": "MercedesTeamRadio.mp3",
            "Red Bull": "RedBullTeamRadio.mp3",
            "Ferrari": "FerrariTeamRadio.mp3",
            "McLaren": "MclarenTeamRadio.mp3",
            "Aston Martin": "AstonMartinTeamRadio.mp3"
        };

        // 3. Tower ID Setup
        const urlParams = new URLSearchParams(window.location.search);
        const TOWER_ID = urlParams.get('tower') || 'f1lads-tower-obs';

        // 4. WebRTC Connection with STUN Firewalls Bypass
        const peer = new Peer(TOWER_ID, {
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });
        
        const box = document.getElementById('box');

        peer.on('open', () => { 
            box.innerText = `[ SYS ] ${TOWER_ID} : AWAITING SIGNAL`; 
        });

        // 5. Receiving the Call
        peer.on('call', (call) => {
            call.answer(); 
            
            call.on('stream', (remoteStream) => {
                // Pipe the stream into the physical HTML element, not memory
                const liveAudio = document.getElementById('live-voice');
                liveAudio.srcObject = remoteStream;
                liveAudio.play().catch(e => console.error("Live voice blocked:", e));

                db.ref('radioState').once('value').then((snapshot) => {
                    const data = snapshot.val();
                    const actualTeam = (data && data.team) ? data.team : "UNKNOWN"; 

                    box.innerText = `[ RX ] RECEIVING: ${actualTeam}`;
                    box.classList.add('busy');

                    if (stingFiles[actualTeam]) {
                        const stingUrl = GITHUB_BASE_URL + stingFiles[actualTeam];
                        const stingAudio = new Audio(stingUrl);
                        stingAudio.play().catch(e => console.error("Sting block:", e));
                    }

                    // Clean up when the driver lets go of the button
                    call.on('close', () => {
                        liveAudio.pause();
                        liveAudio.srcObject = null;
                        box.innerText = `[ SYS ] ${TOWER_ID} : AWAITING SIGNAL`;
                        box.classList.remove('busy');
                    });
                });
            });
        });

        peer.on('error', (err) => { box.innerText = `[ ERR ] PEER FAILURE: ${err.type}`; });
    </script>
</body>
</html>
