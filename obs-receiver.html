<!DOCTYPE html>
<html>
<head>
    <title>Pitwall Receiver</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: transparent; color: #00D7B6; font-family: monospace; padding: 10px; font-weight: bold; font-size: 14px; }
        #box { background: rgba(0,0,0,0.85); padding: 12px; border-radius: 4px; border-left: 5px solid #00D7B6; display: inline-block; min-width: 250px; text-transform: uppercase; letter-spacing: 1px; }
        .busy { border-left-color: #ff4444 !important; color: #ff4444 !important; }
    </style>
</head>
<body>
    <div id="box">[ SYS ] INITIALIZING RECEIVER...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCiZwdBkZBZubr8oVsG8hkNE-x2iq3HJ0",
            authDomain: "f1-lads-team-radio-589fc.firebaseapp.com",
            databaseURL: "https://f1-lads-team-radio-589fc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "f1-lads-team-radio-589fc",
            storageBucket: "f1-lads-team-radio-589fc.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const GITHUB_BASE_URL = "https://raw.githubusercontent.com/f1ladsleague/team-radio/main/F1-Radio-System/";
        const stingFiles = {
            "Mercedes": "MercedesTeamRadio.mp3",
            "Red Bull": "RedBullTeamRadio.mp3",
            "Ferrari": "FerrariTeamRadio.mp3",
            "McLaren": "MclarenTeamRadio.mp3",
            "Aston Martin": "AstonMartinTeamRadio.mp3"
        };

        // Determine which tower this is based on the URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const TOWER_ID = urlParams.get('tower') || 'f1lads-tower-obs'; // Defaults to OBS if no parameter is provided

        const peer = new Peer(TOWER_ID);
        const box = document.getElementById('box');

        peer.on('open', () => { 
            box.innerText = `[ SYS ] ${TOWER_ID} : AWAITING SIGNAL`; 
        });

        peer.on('call', (call) => {
            call.answer(); 
            
            call.on('stream', (remoteStream) => {
                const remoteAudio = new Audio();
                remoteAudio.srcObject = remoteStream;
                remoteAudio.play().catch(e => console.error(e));

                db.ref('radioState').once('value').then((snapshot) => {
                    const data = snapshot.val();
                    const actualTeam = (data && data.team) ? data.team : "UNKNOWN"; 

                    box.innerText = `[ RX ] RECEIVING: ${actualTeam}`;
                    box.classList.add('busy');

                    if (stingFiles[actualTeam]) {
                        const stingUrl = GITHUB_BASE_URL + stingFiles[actualTeam];
                        const stingAudio = new Audio(stingUrl);
                        stingAudio.play().catch(e => console.error("Sting block:", e));
                    }

                    call.on('close', () => {
                        remoteAudio.pause();
                        remoteAudio.srcObject = null;
                        box.innerText = `[ SYS ] ${TOWER_ID} : AWAITING SIGNAL`;
                        box.classList.remove('busy');
                    });
                });
            });
        });

        peer.on('error', (err) => { box.innerText = `[ ERR ] PEER FAILURE: ${err.type}`; });
    </script>
</body>
</html>
