<!DOCTYPE html>
<html>
<head>
    <title>Pitwall Receiver (VDO.Ninja Edition)</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: transparent; color: #00D7B6; font-family: monospace; padding: 10px; font-weight: bold; font-size: 14px; }
        #box { background: rgba(0,0,0,0.85); padding: 12px; border-radius: 4px; border-left: 5px solid #00D7B6; display: inline-block; min-width: 250px; text-transform: uppercase; letter-spacing: 1px; }
        .busy { border-left-color: #ff4444 !important; color: #ff4444 !important; }
        
        #unlock-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(225, 6, 0, 0.95); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; cursor: pointer; z-index: 9999; text-align: center;
        }
        
        /* DEBUG MODE: Visible Receiver Box */
        #vdo-rx { width: 300px; height: 200px; position: fixed; bottom: 10px; right: 10px; border: 2px solid #00D7B6; background: #000; z-index: 9999; }
    </style>
</head>
<body>

    <div id="unlock-overlay" onclick="unlockAudio()">CLICK ANYWHERE TO UNLOCK TEAM RADIO</div>

    <div id="box">[ SYS ] INITIALIZING RECEIVER...</div>
    
    <iframe id="vdo-rx" allow="autoplay;camera;microphone"></iframe>

    <script>
        function unlockAudio() {
            const silentAudio = new Audio();
            silentAudio.play().catch(e => {}); 
            document.getElementById('unlock-overlay').style.display = 'none';
            
            // Connect to the VDO Ninja Room. The &scene parameter grabs all audio.
            document.getElementById('vdo-rx').src = "https://vdo.ninja/?room=F1Lads_Global_Radio_2026&scene&autostart&cleanoutput";
            document.getElementById('box').innerText = `[ SYS ] SECURE CONNECTION ESTABLISHED`; 
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCCiZwdBkZBZubr8oVsG8hkNE-x2iq3HJ0",
            authDomain: "f1-lads-team-radio-589fc.firebaseapp.com",
            databaseURL: "https://f1-lads-team-radio-589fc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "f1-lads-team-radio-589fc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const GITHUB_BASE_URL = "https://raw.githubusercontent.com/f1ladsleague/team-radio/main/F1-Radio-System/";
        const stingFiles = {
            "Mercedes": "MercedesTeamRadio.mp3",
            "Red Bull": "RedBullTeamRadio.mp3",
            "Ferrari": "FerrariTeamRadio.mp3",
            "McLaren": "MclarenTeamRadio.mp3",
            "Aston Martin": "AstonMartinTeamRadio.mp3"
        };

        const box = document.getElementById('box');

        // Listen for Firebase triggers from the Drivers
        db.ref('radioState').on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data && data.active) {
                const actualTeam = data.team ? data.team : "UNKNOWN"; 
                box.innerText = `[ RX ] RECEIVING: ${actualTeam}`;
                box.classList.add('busy');

                if (stingFiles[actualTeam]) {
                    const stingAudio = new Audio(GITHUB_BASE_URL + stingFiles[actualTeam]);
                    stingAudio.play().catch(e => console.error("Sting block:", e));
                }
            } else {
                box.innerText = `[ SYS ] SECURE CONNECTION ESTABLISHED`;
                box.classList.remove('busy');
            }
        });
    </script>
</body>
</html>
