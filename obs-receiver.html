<!DOCTYPE html>
<html>
<head>
    <title>Pitwall Receiver (Firebase Base64 Engine)</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: transparent; color: #00D7B6; font-family: monospace; padding: 10px; font-weight: bold; font-size: 14px; }
        #box { background: rgba(0,0,0,0.85); padding: 12px; border-radius: 4px; border-left: 5px solid #00D7B6; display: inline-block; min-width: 250px; text-transform: uppercase; letter-spacing: 1px; }
        .busy { border-left-color: #ff4444 !important; color: #ff4444 !important; }
    </style>
</head>
<body>

    <div id="box">[ SYS ] WAITING FOR ENCRYPTED COMMS...</div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCiZwdBkZBZubr8oVsG8hkNE-x2iq3HJ0",
            authDomain: "f1-lads-team-radio-589fc.firebaseapp.com",
            databaseURL: "https://f1-lads-team-radio-589fc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "f1-lads-team-radio-589fc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const GITHUB_BASE_URL = "https://raw.githubusercontent.com/f1ladsleague/team-radio/main/F1-Radio-System/";
        const beepUrl = "https://raw.githubusercontent.com/f1ladsleague/team-radio/de150eabe38072f05f2facf5a269dbfeaa56dcbe/F1-Radio-System/radio_beep.mp3";
        
        const stingFiles = {
            "Mercedes": "MercedesTeamRadio.mp3",
            "Red Bull": "RedBullTeamRadio.mp3",
            "Ferrari": "FerrariTeamRadio.mp3",
            "McLaren": "MclarenTeamRadio.mp3",
            "Aston Martin": "AstonMartinTeamRadio.mp3"
        };

        const box = document.getElementById('box');
        let lastPlayedTimestamp = 0; // Prevents re-playing old messages if OBS refreshes

        // Listen for the completed audio package from Firebase
        db.ref('radioState').on('value', (snapshot) => {
            const data = snapshot.val();
            
            // Only trigger playback when the audioPayload text finally arrives
            if (data && data.active && data.audioPayload && data.timestamp > lastPlayedTimestamp) {
                lastPlayedTimestamp = data.timestamp; // Mark as played
                
                const actualTeam = data.team ? data.team : "UNKNOWN"; 
                box.innerText = `[ RX ] RECEIVING: ${actualTeam}`;
                box.classList.add('busy');

                // 1. Play the Radio Beep
                const beepAudio = new Audio(beepUrl);
                beepAudio.play().catch(e => console.error("Beep block:", e));

                // 2. Play the Team Sting (500ms delay)
                if (stingFiles[actualTeam]) {
                    setTimeout(() => {
                        const stingAudio = new Audio(GITHUB_BASE_URL + stingFiles[actualTeam]);
                        stingAudio.play().catch(e => console.error("Sting block:", e));
                        
                        // 3. Play the Base64 Voice Recording (1500ms delay to let sting finish)
                        setTimeout(() => {
                            // Convert the Base64 text back into physical audio and play it!
                            const constructorVoice = new Audio(data.audioPayload);
                            constructorVoice.play()
                                .then(() => console.log("Voice successfully decoded and played."))
                                .catch(e => console.error("Voice block:", e));
                                
                            // 4. Wait for the 5-second voice note to finish, then clear UI
                            setTimeout(() => {
                                box.innerText = `[ SYS ] WAITING FOR ENCRYPTED COMMS...`;
                                box.classList.remove('busy');
                            }, 5000);

                        }, 1000); // 1-second gap after the sting starts before the voice drops
                    }, 500);
                }
            } 
            else if (data && !data.active) {
                box.innerText = `[ SYS ] WAITING FOR ENCRYPTED COMMS...`;
                box.classList.remove('busy');
            }
        });
    </script>
</body>
</html>
