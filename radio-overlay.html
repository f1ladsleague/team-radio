<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; }
        
        /* Make the container full screen to match your 1920x1080 video */
        #radio-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            display: none; /* Hidden until triggered */
            justify-content: center;
            align-items: center;
        }

        /* Ensure the video fills the canvas exactly as it did in After Effects */
        #radio-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="radio-container">
        <video id="radio-video" src="F1-Radio-System/team_radio_anim.webm" muted></video>
    </div>

    <audio id="beep-sound" src="F1-Radio-System/radio_beep.mp3"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCiZwdBkZBZubr8oVsG8hkNE-x2iq3HJ0",
            authDomain: "f1-lads-team-radio-589fc.firebaseapp.com",
            databaseURL: "https://f1-lads-team-radio-589fc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "f1-lads-team-radio-589fc",
            storageBucket: "f1-lads-team-radio-589fc.firebasestorage.app",
            messagingSenderId: "449577983062",
            appId: "1:449577983062:web:db65755d30d1c6a14ceff7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const container = document.getElementById('radio-container');
        const video = document.getElementById('radio-video');
        const beep = document.getElementById('beep-sound');

        // This variable prevents the sound from playing when you click STOP
        let wasActive = false;

        db.ref('radioState').on('value', (snapshot) => {
            const data = snapshot.val();
            const isActive = data && data.active === true;

            if (isActive) {
                container.style.display = 'flex';
                video.play();
                
                // ONLY play the beep if it wasn't already active (The transition from OFF to ON)
                if (!wasActive) {
                    beep.currentTime = 0;
                    beep.play().catch(err => console.error("Audio error:", err));
                }
            } else {
                container.style.display = 'none';
                video.pause();
                video.currentTime = 0;
            }

            // Update the state for the next check
            wasActive = isActive;
        });
    </script>
</body>
</html>
