<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; }
        
        #radio-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            display: none;
            justify-content: center;
            align-items: center;
        }

        #radio-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="radio-container">
        <video id="radio-video" muted></video>
    </div>

    <audio id="beep-sound" src="F1-Radio-System/radio_beep.mp3"></audio>

    <script>
        // --- FIREBASE CONFIG (UPDATE URL) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCCiZwdBkZBZubr8oVsG8hkNE-x2iq3HJ0",
            authDomain: "f1-lads-team-radio-589fc.firebaseapp.com",
            databaseURL: "https://f1-lads-team-radio-589fc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "f1-lads-team-radio-589fc",
            storageBucket: "f1-lads-team-radio-589fc.firebasestorage.app",
            messagingSenderId: "449577983062",
            appId: "1:449577983062:web:db65755d30d1c6a14ceff7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const container = document.getElementById('radio-container');
        const video = document.getElementById('radio-video');
        const beep = document.getElementById('beep-sound');

        let wasActive = false;

        db.ref('radioState').on('value', (snapshot) => {
            const data = snapshot.val();
            const isActive = data && data.active === true;

            if (isActive) {
                // 1. Update the video source based on the driver selected
                // E.g. "F1-Radio-System/Mapa_Ferrari.webm"
                video.src = `F1-Radio-System/${data.video}`;
                
                // 2. Show container and play video
                container.style.display = 'flex';
                video.load(); // Force reload of new source
                video.play().catch(e => console.error("Video Error:", e));
                
                // 3. Play sound ONLY on initial trigger
                if (!wasActive) {
                    beep.currentTime = 0;
                    beep.play().catch(e => console.error("Audio Error:", e));
                }
            } else {
                // Stop transmission
                container.style.display = 'none';
                video.pause();
                video.src = ""; // Clear source to prevent ghost frames
            }

            wasActive = isActive;
        });
    </script>
</body>
</html>
