<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: 'Titillium Web', sans-serif; }
        #radio-container {
            position: absolute;
            bottom: 180px;
            left: 100px;
            display: none;
            align-items: center;
        }
        #radio-video { width: 450px; }
        #debug-log { position: fixed; top: 0; left: 0; background: rgba(0,0,0,0.8); color: lime; font-family: monospace; font-size: 12px; padding: 5px; z-index: 100; }
    </style>
</head>
<body>
    <div id="debug-log">Status: Initializing...</div>

    <div id="radio-container">
        <video id="radio-video" src="F1-Radio-System/team_radio_anim.webm" muted></video>
    </div>

    <audio id="beep-sound" src="F1-Radio-System/radio_beep.mp3"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCiZwdBkZBZubr8oVsG8hkNE-x2iq3HJ0",
            authDomain: "f1-lads-team-radio-589fc.firebaseapp.com",
            databaseURL: "https://f1-lads-team-radio-589fc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "f1-lads-team-radio-589fc",
            storageBucket: "f1-lads-team-radio-589fc.firebasestorage.app",
            messagingSenderId: "449577983062",
            appId: "1:449577983062:web:db65755d30d1c6a14ceff7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const debug = document.getElementById('debug-log');

        // Connection Check
        db.ref('.info/connected').on('value', (snap) => {
            debug.innerText = snap.val() ? "Status: Connected to Firebase" : "Status: DISCONNECTED";
            debug.style.color = snap.val() ? "lime" : "red";
        });

        const container = document.getElementById('radio-container');
        const video = document.getElementById('radio-video');
        const beep = document.getElementById('beep-sound');

        db.ref('radioState').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.active === true) {
                debug.innerText = "Status: RADIO ACTIVE (" + data.team + ")";
                container.style.display = 'flex';
                beep.play().catch(err => console.error("Audio error:", err));
                video.play().catch(err => console.error("Video error:", err));
            } else {
                debug.innerText = "Status: Idle";
                container.style.display = 'none';
                video.pause();
                video.currentTime = 0;
            }
        });
    </script>
</body>
</html>
